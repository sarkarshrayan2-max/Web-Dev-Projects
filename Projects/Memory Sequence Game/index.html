<!DOCTYPE html>
<html>
<head>
  <title>Memory Sequence Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧠 Memory Sequence Game</h1>

<button onclick="startGame()" id="startBtn">Start Game</button>

<h2 id="level">Level: 0</h2>
<h3 id="highScore">High Score: 0</h3>

<p id="status">Press Start to play</p>

<div class="container">
  <div class="btn red" id="red"></div>
  <div class="btn blue" id="blue"></div>
  <div class="btn green" id="green"></div>
  <div class="btn yellow" id="yellow"></div>
</div>

<script src="script.js"></script>
</body>
</html>

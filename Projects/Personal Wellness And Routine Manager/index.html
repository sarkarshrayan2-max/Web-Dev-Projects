<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Wellness & Routine Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>🌿 Wellness & Routine</h1>
                <p id="currentDate">Today</p>
            </div>
            <div class="header-right">
                <button id="themeToggle" class="btn-icon">🌙</button>
            </div>
        </header>

        <div class="dashboard">
            <!-- Left Column: Daily Routine & Habits -->
            <div class="column">
                <section class="card">
                    <div class="card-header">
                        <h2>📋 Daily Routine</h2>
                        <button id="addRoutineBtn" class="btn-small">+ Add</button>
                    </div>
                    <ul id="routineList" class="task-list">
                        <!-- Routines will be injected here -->
                    </ul>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2>⭐ Habits Tracker</h2>
                        <button id="addHabitBtn" class="btn-small">+ Add</button>
                    </div>
                    <ul id="habitList" class="habit-list">
                        <!-- Habits will be injected here -->
                    </ul>
                </section>
            </div>

            <!-- Middle Column: Trackers -->
            <div class="column">
                <section class="card tracker-card water-tracker">
                    <h2>💧 Water Intake</h2>
                    <div class="progress-container">
                        <div class="circular-progress" id="waterProgress">
                            <span id="waterValue">0 / 8</span>
                        </div>
                    </div>
                    <div class="tracker-actions">
                        <button id="removeWaterBtn" class="btn-circle">-</button>
                        <span>Glasses</span>
                        <button id="addWaterBtn" class="btn-circle">+</button>
                    </div>
                </section>

                <section class="card tracker-card sleep-tracker">
                    <h2>🌙 Sleep Tracker</h2>
                    <div class="input-group">
                        <label for="sleepHours">Hours Slept:</label>
                        <input type="number" id="sleepHours" min="0" max="24" step="0.5" value="0">
                        <button id="saveSleepBtn" class="btn-primary">Save</button>
                    </div>
                    <p class="sleep-status" id="sleepStatus">Record your sleep.</p>
                </section>

                <section class="card tracker-card exercise-tracker">
                    <h2>🏃 Exercise Log</h2>
                    <div class="input-group">
                        <input type="text" id="exerciseType" placeholder="Workout type">
                        <input type="number" id="exerciseDuration" placeholder="Mins" min="1">
                        <button id="saveExerciseBtn" class="btn-primary">Log</button>
                    </div>
                    <p class="exercise-status" id="exerciseStatus">No exercise logged today.</p>
                </section>
            </div>

            <!-- Right Column: Goals & Insights -->
            <div class="column">
                <section class="card">
                    <div class="card-header">
                        <h2>🎯 Wellness Goals</h2>
                        <button id="addGoalBtn" class="btn-small">+ Add</button>
                    </div>
                    <ul id="goalList" class="goal-list">
                        <!-- Goals will be injected here -->
                    </ul>
                </section>

                <section class="card summary-card">
                    <h2>📊 Daily Insights</h2>
                    <div class="insight-item">
                        <span>Wellness Score</span>
                        <div class="score-bar">
                            <div class="score-fill" id="wellnessScoreFill"></div>
                        </div>
                        <span id="wellnessScoreText">0%</span>
                    </div>
                    <div class="insight-item">
                        <span>Habit Completion</span>
                        <span id="habitCompletionText">0/0</span>
                    </div>
                    <div class="insight-item">
                        <span>Routine Completion</span>
                        <span id="routineCompletionText">0/0</span>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

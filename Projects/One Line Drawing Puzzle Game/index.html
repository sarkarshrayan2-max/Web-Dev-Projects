<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Line Drawing Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="container">

    <div class="header">
        <h1>🎯 One Line Drawing Puzzle</h1>
        <p>Connect all lines exactly once without retracing.</p>
    </div>

    <div class="stats">

        <div class="card">
            <span class="label">Level</span>
            <span id="level">1</span>
        </div>

        <div class="card">
            <span class="label">Progress</span>
            <span id="progress">0/0</span>
        </div>

        <div class="card">
            <span class="label">Time</span>
            <span id="timer">00:00</span>
        </div>

    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
    </div>

    <div class="buttons">
        <button id="resetBtn">↺ Restart</button>
        <button id="nextBtn">➜ New Puzzle</button>
    </div>

</div>

<div class="modal hidden" id="winModal">
    <div class="modal-content">
        <h2>🎉 Puzzle Solved!</h2>
        <p>You completed the challenge.</p>
        <button id="continueBtn">Next Level</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Deep Analytical Dark Workspace Canvas Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020306" />
      <stop offset="50%" stop-color="#060914" />
      <stop offset="100%" stop-color="#0d1122" />
    </linearGradient>

    <!-- UI Panel Floating Intuitive Glow Drop Shadows -->
    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.02"/>
    </filter>

    <!-- Target Color Specimen Intense Glow Bloom Filter -->
    <filter id="specimenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Core Brand Spectrum Track Gradient -->
    <linearGradient id="mixerBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Technical UI Alignment Matrix Pattern Overlay -->
    <pattern id="matrixGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- BACKGROUND BASELAYERS -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#matrixGrid)" />
  
  <!-- Subtle Ambient Vignette Backlighting Flares -->
  <circle cx="680" cy="120" r="180" fill="#3b82f6" opacity="0.02" filter="blur(55px)" />
  <circle cx="150" cy="380" r="160" fill="#ef4444" opacity="0.02" filter="blur(45px)" />

  <!-- ====================================================================
       BLIND COLOR MIXER INTERACTIVE MAIN APPLICATION WINDOW
       ==================================================================== -->
  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <!-- Main Outer Window Frame Chassis -->
    <rect width="700" height="380" rx="16" fill="#0f172a" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <!-- OS Control Points Window Chrome -->
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <!-- App Identity Top Right Flag -->
    <g transform="translate(555, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#mixerBrand)" />
      <text x="14" y="10" font-family="monospace" font-size="11" font-weight="900" fill="#f8fafc" letter-spacing="0.05em">BLIND_MIXER</text>
    </g>

    <!-- ==================================================================
         COLUMN 1: LEFT SIDEBAR SIMULATION Telemetry HUD
         ================================================================== -->
    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Intuition HUD</text>
      
      <!-- Current Session Phase Status Readout -->
      <rect y="24" width="126" height="24" rx="6" fill="rgba(59, 130, 246, 0.06)" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="9" font-weight="800" fill="#3b82f6" letter-spacing="0.02em">● VISUAL_MATCH</text>

      <!-- Numerical Performance Caching Panels -->
      <g transform="translate(0, 64)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">DELTA ACCURACY</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#10b981">94.5% Match</text>
      </g>

      <g transform="translate(0, 118)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">CURRENT STREAK</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#3b82f6">06 Correct</text>
      </g>

      <!-- Primary Verification Action Button Wireframe -->
      <rect y="184" width="126" height="34" rx="8" fill="rgba(16, 185, 129, 0.12)" stroke="#10b981" stroke-width="1.5"/>
      <text x="63" y="21" font-family="monospace" font-size="10" font-weight="900" fill="#10b981" text-anchor="middle">EVALUATE MIX ▶</text>
    </g>

    <!-- Vertical Splitter Layout Column Line 1 -->
    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <!-- ==================================================================
         COLUMN 2: CENTRAL BLIND CHROMA BOXES & VALUELESS RGB SLIDERS
         ================================================================== -->
    <g transform="translate(192, 52)">
      
      <!-- TOP CARDS: Color Comparison Corridor -->
      <g>
        <!-- Target Color Box (Given Reference Specimen) -->
        <g filter="url(#specimenGlow)">
          <rect width="230" height="90" rx="10" fill="#e11d48" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <text x="16" y="24" font-family="-apple-system, sans-serif" font-size="9" font-weight="800" fill="#ffffff" opacity="0.6" letter-spacing="0.05em">TARGET SPECIMEN</text>
        </g>

        <!-- User Real-Time Mixed Box (Adjustable Intuitive Feedback) -->
        <g transform="translate(248, 0)">
          <rect width="230" height="90" rx="10" fill="#be123c" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
          <text x="16" y="24" font-family="-apple-system, sans-serif" font-size="9" font-weight="800" fill="#ffffff" opacity="0.6" letter-spacing="0.05em">YOUR MIXTURE</text>
        </g>
      </g>

      <!-- BOTTOM CHASSIS: Valueless input range rails with hidden metrics -->
      <g transform="translate(0, 116)">
        <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="0.05em">ANALOG CHANNEL MIXER (VALUES &amp; SCALES CONCEALED)</text>
        
        <!-- Red Slider Track -->
        <g transform="translate(0, 30)">
          <rect width="478" height="34" rx="6" fill="#1e293b" opacity="0.4" stroke="rgba(239, 68, 68, 0.15)" stroke-width="1"/>
          <circle cx="20" cy="17" r="4" fill="#ef4444"/>
          <!-- Valueless Slider Track Line and Knob -->
          <line x1="60" y1="17" x2="440" y2="17" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
          <line x1="60" y1="17" x2="320" y2="17" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
          <circle cx="320" cy="17" r="7" fill="#f8fafc" stroke="#ef4444" stroke-width="2"/>
          <text x="462" y="21" font-family="monospace" font-size="11" font-weight="900" fill="#475569">?</text>
        </g>

        <!-- Green Slider Track -->
        <g transform="translate(0, 76)">
          <rect width="478" height="34" rx="6" fill="#1e293b" opacity="0.4" stroke="rgba(34, 197, 94, 0.15)" stroke-width="1"/>
          <circle cx="20" cy="17" r="4" fill="#22c55e"/>
          <line x1="60" y1="17" x2="440" y2="17" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
          <line x1="60" y1="17" x2="140" y2="17" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
          <circle cx="140" cy="17" r="7" fill="#f8fafc" stroke="#22c55e" stroke-width="2"/>
          <text x="462" y="21" font-family="monospace" font-size="11" font-weight="900" fill="#475569">?</text>
        </g>

        <!-- Blue Slider Track -->
        <g transform="translate(0, 122)">
          <rect width="478" height="34" rx="6" fill="#1e293b" opacity="0.4" stroke="rgba(59, 130, 246, 0.15)" stroke-width="1"/>
          <circle cx="20" cy="17" r="4" fill="#3b82f6"/>
          <line x1="60" y1="17" x2="440" y2="17" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
          <line x1="60" y1="17" x2="220" y2="17" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
          <circle cx="220" cy="17" r="7" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
          <text x="462" y="21" font-family="monospace" font-size="11" font-weight="900" fill="#475569">?</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ====================================================================
       FOOTER PIPELINE FRAMEWORK TECHNICAL MANIFEST MODULE CAPSULE
       ==================================================================== -->
  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(2, 3, 6, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">INTUITION COLOR MIXER</text>
    <circle cx="196" cy="22" r="2" fill="#475569" />
    
    <!-- Code Language Tech Badges -->
    <text x="212" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="262" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="308" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <!-- Algorithmic Paradigm Specification Tag -->
    <rect x="352" y="13" width="64" height="16" rx="4" fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.15)" stroke-width="1"/>
    <text x="358" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#3b82f6" letter-spacing="0.02em">RGB_DELTA</text>
  </g>
</svg>

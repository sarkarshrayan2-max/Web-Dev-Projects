<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#05060c"/>
  <rect x="10" y="10" width="300" height="180" rx="10" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- topbar -->
  <text x="18" y="28" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#64748b">Quote Generator</text>
  <rect x="260" y="16" width="40" height="18" rx="4" fill="rgba(0,240,255,0.05)" stroke="rgba(0,240,255,0.08)" stroke-width="1"/>
  <text x="280" y="29" font-family="system-ui, sans-serif" font-size="5" font-weight="700" fill="#00f0ff" text-anchor="middle">📑 2</text>
  <!-- card -->
  <rect x="14" y="40" width="292" height="120" rx="14" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="22" y="58" font-family="Georgia, serif" font-size="48" fill="rgba(0,240,255,0.06)">“</text>
  <text x="42" y="78" font-family="Georgia, serif" font-size="9" fill="#e2e8f0">The only way to do great</text>
  <text x="42" y="90" font-family="Georgia, serif" font-size="9" fill="#e2e8f0">work is to love what you do.</text>
  <text x="42" y="108" font-family="Georgia, serif" font-size="7" fill="#64748b" font-style="italic">— Steve Jobs</text>
  <rect x="42" y="120" width="48" height="14" rx="3" fill="rgba(0,240,255,0.06)"/>
  <text x="66" y="131" font-family="system-ui, sans-serif" font-size="5" font-weight="700" fill="#00f0ff" text-anchor="middle" letter-spacing="1">MOTIVATION</text>
  <!-- toolbar -->
  <rect x="14" y="168" width="68" height="20" rx="6" fill="#00f0ff"/>
  <text x="48" y="183" font-family="system-ui, sans-serif" font-size="5" font-weight="700" fill="#05060c" text-anchor="middle">New Quote</text>
  <rect x="88" y="168" width="40" height="20" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="108" y="183" font-family="system-ui, sans-serif" font-size="5" fill="#64748b" text-anchor="middle">Copy</text>
  <rect x="134" y="168" width="40" height="20" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="154" y="183" font-family="system-ui, sans-serif" font-size="6" fill="#64748b" text-anchor="middle">♥</text>
  <rect x="180" y="168" width="40" height="20" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="200" y="183" font-family="system-ui, sans-serif" font-size="5" fill="#64748b" text-anchor="middle">Share</text>
</svg>

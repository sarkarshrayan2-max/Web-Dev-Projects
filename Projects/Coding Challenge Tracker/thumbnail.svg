<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Grid Lines -->
  <path d="M 0,50 L 500,50 M 0,100 L 500,100 M 0,150 L 500,150 M 0,200 L 500,200 M 0,250 L 500,250" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300 M 400,0 L 400,300 M 450,0 L 450,300" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  
  <!-- Sidebar simulation -->
  <rect x="0" y="0" width="75" height="300" rx="20" fill="rgba(17, 24, 39, 0.45)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  
  <!-- Brand Logo -->
  <g transform="translate(37, 40)">
    <circle cx="0" cy="0" r="12" fill="url(#blueGrad)"/>
    <text x="0" y="4" font-family="'Outfit', sans-serif" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>
  </g>
  
  <!-- Sidebar items mock -->
  <circle cx="37" cy="90" r="4" fill="#3b82f6"/>
  <circle cx="37" cy="125" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="37" cy="160" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="37" cy="195" r="4" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Header Title -->
  <text x="95" y="42" font-family="'Outfit', sans-serif" font-weight="800" font-size="20" fill="#ffffff">DevTracker</text>
  <text x="95" y="58" font-family="'Inter', sans-serif" font-weight="500" font-size="10" fill="#94a3b8">Coding streak and goal tracker</text>
  
  <!-- Streak Fire Widget -->
  <rect x="360" y="20" width="120" height="40" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)"/>
  
  <!-- Fire Icon (embedded raw shape) -->
  <g transform="translate(378, 32) scale(0.6)">
    <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12C22,5 15,2 12,2M12,18C8.69,18 6,15.31 6,12C6,8.69 8.69,6 12,6C13.5,6 14.8,6.5 15.8,7.4C14,8.5 13,10.2 13,12C13,13.8 14,15.5 15.8,16.6C14.8,17.5 13.5,18 12,18Z" fill="url(#primaryGrad)"/>
  </g>
  <text x="430" y="34" font-family="'Inter', sans-serif" font-weight="600" font-size="8" fill="#94a3b8" text-anchor="middle">STREAK</text>
  <text x="430" y="48" font-family="'Outfit', sans-serif" font-weight="800" font-size="12" fill="#ef4444" text-anchor="middle">12 Days</text>
  
  <!-- Core Design: Interactive Logs Panel -->
  <g transform="translate(95, 80)">
    <!-- Main Card Body -->
    <rect width="250" height="195" rx="14" fill="rgba(30, 41, 59, 0.45)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" filter="url(#shadow)"/>
    
    <text x="15" y="25" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#ffffff">Log Challenge</text>
    
    <!-- Logging Input simulation -->
    <rect x="15" y="38" width="220" height="24" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)"/>
    <text x="25" y="52" font-family="'Inter', sans-serif" font-size="8.5" fill="#e2e8f0">Two Sum</text>
    
    <!-- Badges Row -->
    <rect x="15" y="72" width="60" height="18" rx="4" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.2)"/>
    <text x="45" y="84" font-family="'Inter', sans-serif" font-weight="600" font-size="8" fill="#60a5fa" text-anchor="middle">LeetCode</text>
    
    <rect x="80" y="72" width="60" height="18" rx="4" fill="rgba(16, 185, 129, 0.1)" stroke="rgba(16, 185, 129, 0.2)"/>
    <text x="110" y="84" font-family="'Inter', sans-serif" font-weight="600" font-size="8" fill="#34d399" text-anchor="middle">Easy</text>
    
    <rect x="145" y="72" width="60" height="18" rx="4" fill="rgba(239, 68, 68, 0.1)" stroke="rgba(239, 68, 68, 0.2)"/>
    <text x="175" y="84" font-family="'Inter', sans-serif" font-weight="600" font-size="8" fill="#f87171" text-anchor="middle">Algorithms</text>

    <!-- Table Simulator -->
    <rect x="15" y="105" width="220" height="70" rx="8" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.04)"/>
    <line x1="15" y1="125" x2="235" y2="125" stroke="rgba(255,255,255,0.04)"/>
    <line x1="15" y1="150" x2="235" y2="150" stroke="rgba(255,255,255,0.04)"/>
    
    <!-- Table Row 1 -->
    <text x="25" y="118" font-family="'Inter', sans-serif" font-weight="700" font-size="8" fill="#ffffff">Two Sum</text>
    <text x="110" y="118" font-family="'Inter', sans-serif" font-size="7.5" fill="#34d399">Easy</text>
    <text x="225" y="118" font-family="'Inter', sans-serif" font-size="7.5" fill="#94a3b8" text-anchor="end">LeetCode</text>
    
    <!-- Table Row 2 -->
    <text x="25" y="140" font-family="'Inter', sans-serif" font-weight="700" font-size="8" fill="#ffffff">Merge Intervals</text>
    <text x="110" y="140" font-family="'Inter', sans-serif" font-size="7.5" fill="#f59e0b">Medium</text>
    <text x="225" y="140" font-family="'Inter', sans-serif" font-size="7.5" fill="#94a3b8" text-anchor="end">LeetCode</text>

    <!-- Table Row 3 -->
    <text x="25" y="165" font-family="'Inter', sans-serif" font-weight="700" font-size="8" fill="#ffffff">Solve Maze</text>
    <text x="110" y="165" font-family="'Inter', sans-serif" font-size="7.5" fill="#ef4444">Hard</text>
    <text x="225" y="165" font-family="'Inter', sans-serif" font-size="7.5" fill="#94a3b8" text-anchor="end">HackerRank</text>
  </g>
  
  <!-- Right Dashboard Graph (Canvas Stats) -->
  <g transform="translate(365, 80)">
    <rect width="115" height="195" rx="14" fill="rgba(30, 41, 59, 0.45)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1.5"/>
    <text x="15" y="25" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff">Progress</text>
    
    <!-- Circle Goal Meter Mock -->
    <circle cx="58" cy="70" r="30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="6"/>
    <circle cx="58" cy="70" r="30" fill="none" stroke="url(#secondaryGrad)" stroke-width="6" stroke-dasharray="140, 50" stroke-linecap="round"/>
    <text x="58" y="74" font-family="'Outfit', sans-serif" font-weight="800" font-size="12" fill="#ffffff" text-anchor="middle">75%</text>
    
    <text x="58" y="115" font-family="'Inter', sans-serif" font-weight="500" font-size="8" fill="#94a3b8" text-anchor="middle">DAILY GOAL</text>
    
    <!-- Milestone Badges Grid -->
    <rect x="15" y="135" width="85" height="42" rx="8" fill="rgba(245, 158, 11, 0.08)" stroke="rgba(245,158,11,0.2)"/>
    <circle cx="28" cy="156" r="6" fill="#f59e0b"/>
    <text x="28" y="159" font-family="'Inter', sans-serif" font-weight="800" font-size="8" fill="#ffffff" text-anchor="middle">🏆</text>
    <text x="38" y="159" font-family="'Inter', sans-serif" font-weight="700" font-size="8" fill="#f59e0b">50 Solved</text>
  </g>
</svg>

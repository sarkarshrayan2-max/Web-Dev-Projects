<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" /> <!-- Deep indigo -->
      <stop offset="100%" stop-color="#0f172a" /> <!-- Slate dark -->
    </linearGradient>

    <!-- Highlighted Tile Gradient -->
    <linearGradient id="tile-active" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Normal Tile Gradient -->
    <linearGradient id="tile-normal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="500" height="300" fill="url(#bg)" />

  <!-- The Grid (4x4 representation) -->
  <g transform="translate(140, 40)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="45" height="45" rx="8" fill="url(#tile-normal)" />
    <rect x="55" y="0" width="45" height="45" rx="8" fill="url(#tile-active)" filter="url(#glow)"/>
    <rect x="110" y="0" width="45" height="45" rx="8" fill="url(#tile-normal)" />
    <rect x="165" y="0" width="45" height="45" rx="8" fill="url(#tile-normal)" />

    <!-- Row 2 -->
    <rect x="0" y="55" width="45" height="45" rx="8" fill="url(#tile-normal)" />
    <rect x="55" y="55" width="45" height="45" rx="8" fill="url(#tile-normal)" />
    <rect x="110" y="55" width="45" height="45" rx="8" fill="url(#tile-active)" filter="url(#glow)"/>
    <rect x="165" y="55" width="45" height="45" rx="8" fill="url(#tile-normal)" />

    <!-- Row 3 -->
    <rect x="0" y="110" width="45" height="45" rx="8" fill="url(#tile-active)" filter="url(#glow)"/>
    <rect x="55" y="110" width="45" height="45" rx="8" fill="url(#tile-normal)" />
    <rect x="110" y="110" width="45" height="45" rx="8" fill="url(#tile-normal)" />
    <rect x="165" y="110" width="45" height="45" rx="8" fill="url(#tile-normal)" />

    <!-- Row 4 -->
    <rect x="0" y="165" width="45" height="45" rx="8" fill="url(#tile-normal)" />
    <rect x="55" y="165" width="45" height="45" rx="8" fill="url(#tile-normal)" />
    <rect x="110" y="165" width="45" height="45" rx="8" fill="url(#tile-active)" filter="url(#glow)"/>
    <rect x="165" y="165" width="45" height="45" rx="8" fill="url(#tile-active)" filter="url(#glow)"/>
  </g>

  <!-- Floating particles/sparkles near active tiles -->
  <circle cx="210" cy="30" r="3" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="280" cy="120" r="2" fill="#818cf8" />
  <circle cx="120" cy="130" r="4" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="340" cy="240" r="3" fill="#818cf8" filter="url(#glow)"/>

  <!-- Title Text -->
  <text x="250" y="275" font-family="system-ui, sans-serif" font-weight="900" font-size="28" fill="#f8fafc" text-anchor="middle" letter-spacing="1">GRID RECALL</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0f1a" />
      <stop offset="100%" stop-color="#181b30" />
    </linearGradient>

    <!-- Glowing Blob Gradients -->
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0" />
    </radialGradient>

    <!-- Book Gradients -->
    <linearGradient id="book1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#554beb" />
      <stop offset="100%" stop-color="#6c63ff" />
    </linearGradient>
    <linearGradient id="book2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#db2777" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="book3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>

    <!-- Glassmorphism Card Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="500" fill="url(#bgGrad)" />

  <!-- Ambient Glow Blobs -->
  <circle cx="200" cy="150" r="300" fill="url(#glowPurple)" />
  <circle cx="650" cy="350" r="250" fill="url(#glowPink)" />

  <!-- Grid lines overlay for tech/modern vibe -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="500" />
    <line x1="200" y1="0" x2="200" y2="500" />
    <line x1="300" y1="0" x2="300" y2="500" />
    <line x1="400" y1="0" x2="400" y2="500" />
    <line x1="500" y1="0" x2="500" y2="500" />
    <line x1="600" y1="0" x2="600" y2="500" />
    <line x1="700" y1="0" x2="700" y2="500" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
  </g>

  <!-- Group of floating decorative UI items -->
  <g filter="url(#shadow)">
    <!-- Main Decorative Card Container (Glassmorphic) -->
    <rect x="120" y="70" width="560" height="360" rx="24" fill="url(#glassGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />

    <!-- Sidebar Representation in Card -->
    <path d="M120 70 h80 v360 h-80 z" fill="#131626" fill-opacity="0.4" rx="24" />
    <!-- Sidebar Items Mock -->
    <rect x="135" y="100" width="50" height="8" rx="4" fill="#ffffff" fill-opacity="0.3" />
    <rect x="135" y="130" width="50" height="8" rx="4" fill="#6c63ff" fill-opacity="0.8" />
    <rect x="135" y="150" width="50" height="8" rx="4" fill="#ffffff" fill-opacity="0.15" />
    <rect x="135" y="170" width="50" height="8" rx="4" fill="#ffffff" fill-opacity="0.15" />
    <rect x="135" y="190" width="50" height="8" rx="4" fill="#ffffff" fill-opacity="0.15" />

    <!-- Main Section Mock -->
    <!-- App Brand -->
    <text x="225" y="115" font-family="'Playfair Display', serif, Georgia" font-size="24" font-weight="bold" fill="#ffffff" letter-spacing="1">Bibliotheca</text>
    <text x="225" y="135" font-family="Inter, sans-serif" font-size="11" fill="#9095b0" letter-spacing="0.5">READING PROGRESS TRACKER</text>

    <!-- Top Stats Badges -->
    <g transform="translate(490, 95)">
      <!-- Stat 1 -->
      <rect x="0" y="0" width="50" height="40" rx="10" fill="#1a1d2e" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.05" />
      <text x="25" y="20" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#6c63ff" text-anchor="middle">12</text>
      <text x="25" y="32" font-family="Inter, sans-serif" font-size="7" fill="#565c7a" text-anchor="middle" letter-spacing="0.5">BOOKS</text>

      <!-- Stat 2 -->
      <rect x="60" y="0" width="50" height="40" rx="10" fill="#1a1d2e" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.05" />
      <text x="85" y="20" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#2dd4bf" text-anchor="middle">85%</text>
      <text x="85" y="32" font-family="Inter, sans-serif" font-size="7" fill="#565c7a" text-anchor="middle" letter-spacing="0.5">RATIO</text>
    </g>

    <!-- Book Covers Stack Representation -->
    <g transform="translate(230, 190)">
      <!-- Book 1 (Underneath Left) -->
      <g transform="rotate(-8, 30, 100)">
        <rect x="0" y="0" width="90" height="130" rx="8" fill="url(#book2Grad)" stroke="#ffffff" stroke-opacity="0.1" />
        <rect x="10" y="10" width="70" height="110" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1" />
        <!-- Miniature Bookmark -->
        <path d="M65 0 v25 l-8 -5 l-8 5 v-25 z" fill="#fbbf24" />
        <text x="45" y="75" font-family="Inter, sans-serif" font-size="36" fill="#ffffff" fill-opacity="0.2" text-anchor="middle">🔖</text>
      </g>

      <!-- Book 2 (Underneath Right) -->
      <g transform="translate(180, 20) rotate(10, 45, 65)">
        <rect x="0" y="0" width="90" height="130" rx="8" fill="url(#book3Grad)" stroke="#ffffff" stroke-opacity="0.1" />
        <rect x="10" y="10" width="70" height="110" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1" />
        <text x="45" y="75" font-family="Inter, sans-serif" font-size="36" fill="#ffffff" fill-opacity="0.2" text-anchor="middle">🚀</text>
      </g>

      <!-- Book 3 (Foreground Central - Giant Cover) -->
      <g transform="translate(75, -10)">
        <!-- Book Shadows -->
        <rect x="-5" y="-5" width="110" height="155" rx="12" fill="#000000" fill-opacity="0.3" filter="url(#glowFilter)" />
        <rect x="0" y="0" width="100" height="145" rx="10" fill="url(#book1Grad)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" />
        <!-- Spine Highlight -->
        <path d="M0 0 h6 v145 h-6 z" fill="#ffffff" fill-opacity="0.15" />
        <rect x="12" y="12" width="76" height="121" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.1" />
        <!-- Emoji Cover Design -->
        <text x="50" y="80" font-family="Inter, sans-serif" font-size="44" text-anchor="middle" filter="url(#shadow)">📖</text>
        <text x="50" y="120" font-family="Inter, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">DUNE</text>
      </g>
    </g>

    <!-- Floating Interface Element: Progress Dialog Overlay -->
    <g transform="translate(425, 290)">
      <!-- Tiny Dialog Container -->
      <rect x="0" y="0" width="220" height="110" rx="16" fill="#131626" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" filter="url(#glowFilter)" />
      
      <!-- Reading Progress Elements -->
      <text x="15" y="25" font-family="Inter, sans-serif" font-weight="bold" font-size="10" fill="#ffffff" letter-spacing="0.5">CURRENT PROGRESS</text>
      
      <!-- Star ratings representation -->
      <text x="205" y="25" font-family="Inter, sans-serif" font-size="10" fill="#fbbf24" text-anchor="end">★★★★★</text>

      <text x="15" y="52" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#ffffff">345 <tspan font-size="10" font-weight="normal" fill="#565c7a">/ 600 pgs</tspan></text>
      
      <!-- Percentage Text -->
      <text x="205" y="52" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#6c63ff" text-anchor="end">57%</text>

      <!-- Progress Track -->
      <rect x="15" y="70" width="190" height="8" rx="4" fill="#0d0f1a" />
      <rect x="15" y="70" width="108" height="8" rx="4" fill="url(#book1Grad)" />
      
      <circle cx="123" cy="74" r="6" fill="#ffffff" filter="url(#shadow)" />
      
      <!-- Info Footer -->
      <text x="15" y="95" font-family="Inter, sans-serif" font-size="8" fill="#9095b0">Shelf: Currently Reading</text>
    </g>
  </g>

  <!-- Subtle glow on the viewport -->
  <circle cx="400" cy="250" r="390" fill="none" stroke="#6c63ff" stroke-opacity="0.05" stroke-width="2" />
</svg>

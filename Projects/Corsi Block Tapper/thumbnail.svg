<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020409" />
      <stop offset="50%" stop-color="#060a15" />
      <stop offset="100%" stop-color="#0c1326" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.03"/>
    </filter>

    <filter id="blockFlashGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="corsiBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>

    <pattern id="spatialGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(59, 130, 246, 0.012)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#spatialGrid)" />
  
  <circle cx="680" cy="380" r="180" fill="#2563eb" opacity="0.02" filter="blur(55px)" />
  <circle cx="150" cy="120" r="160" fill="#3b82f6" opacity="0.025" filter="blur(45px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#0f172a" stroke="rgba(59, 130, 246, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(550, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#corsiBrand)" />
      <text x="14" y="10" font-family="monospace" font-size="11" font-weight="900" fill="#f8fafc" letter-spacing="0.05em">CORSI_SPAN_LAB</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Memory Bounds</text>
      
      <rect y="24" width="126" height="24" rx="6" fill="rgba(59, 130, 246, 0.06)" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="9" font-weight="800" fill="#3b82f6" letter-spacing="0.02em">STATUS: RECALL_PHASE</text>

      <g transform="translate(0, 64)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">CURRENT SPAN BLOCK</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#3b82f6">Level 6 Blocks</text>
      </g>

      <g transform="translate(0, 118)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">MAX SPAN SCORE</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#10b981">Corsi Span: 7.2</text>
      </g>

      <rect y="184" width="126" height="32" rx="6" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
      <text x="63" y="204" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#f8fafc" text-anchor="middle">Restart Matrix</text>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(182, 52)">
      <rect width="496" height="304" rx="10" fill="#03050a" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1.5"/>

      <rect x="40" y="30" width="48" height="42" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
      
      <rect x="180" y="45" width="48" height="42" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
      
      <rect x="360" y="25" width="48" height="42" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>

      <g transform="translate(90, 115)" filter="url(#blockFlashGlow)">
        <rect width="48" height="42" rx="6" fill="#60a5fa" stroke="#f8fafc" stroke-width="1.5"/>
        <rect x="4" y="4" width="40" height="34" rx="3" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      </g>
      
      <rect x="250" y="125" width="48" height="42" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
      
      <rect x="400" y="110" width="48" height="42" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>

      <rect x="60" y="220" width="48" height="42" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
      
      <rect x="195" y="230" width="48" height="42" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
      
      <rect x="330" y="215" width="48" height="42" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>

      <path d="M 64 51 L 114 136 L 274 146" fill="none" stroke="rgba(59, 130, 246, 0.04)" stroke-width="1" stroke-dasharray="3 3"/>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(2, 4, 9, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">VISUOSPATIAL COGNITIVE CORE</text>
    <circle cx="204" cy="22" r="2" fill="#475569" />
    
    <text x="220" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="270" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="316" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="360" y="13" width="56" height="16" rx="4" fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.15)" stroke-width="1"/>
    <text x="366" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#3b82f6" letter-spacing="0.02em">CORSI_BUF</text>
  </g>
</svg>

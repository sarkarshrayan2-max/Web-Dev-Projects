<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060a" />
      <stop offset="50%" stop-color="#080c14" />
      <stop offset="100%" stop-color="#0f1726" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.80"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#10b981" flood-opacity="0.02"/>
    </filter>

    <filter id="badgeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="checkerBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <pattern id="uiGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#uiGrid)" />
  
  <circle cx="680" cy="120" r="180" fill="#3b82f6" opacity="0.03" filter="blur(55px)" />
  <circle cx="150" cy="380" r="160" fill="#10b981" opacity="0.02" filter="blur(45px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#111827" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(555, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#checkerBrand)" />
      <text x="14" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.04em">WCAG_CHECKER</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Color Spectrum</text>
      
      <g transform="translate(0, 24)">
        <rect width="126" height="38" rx="6" fill="#1f2937" fill-opacity="0.6" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
        <text x="10" y="14" font-family="-apple-system, sans-serif" font-size="7" font-weight="700" fill="#64748b" letter-spacing="0.05em">BACKGROUND COLOR</text>
        <circle cx="16" cy="26" r="6" fill="#0f172a" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
        <text x="28" y="29" font-family="monospace" font-size="11" font-weight="800" fill="#f8fafc">#0F172A</text>
      </g>

      <g transform="translate(0, 74)">
        <rect width="126" height="38" rx="6" fill="#1f2937" fill-opacity="0.6" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
        <text x="10" y="14" font-family="-apple-system, sans-serif" font-size="7" font-weight="700" fill="#64748b" letter-spacing="0.05em">TEXT FOREGROUND</text>
        <circle cx="16" cy="26" r="6" fill="#10b981" />
        <text x="28" y="29" font-family="monospace" font-size="11" font-weight="800" fill="#10b981">#10B981</text>
      </g>

      <g transform="translate(0, 126)">
        <rect width="126" height="42" rx="8" fill="#1f2937" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">CONTRAST RATIO</text>
        <text x="10" y="34" font-family="monospace" font-size="15" font-weight="800" fill="#3b82f6">8.42 : 1</text>
      </g>

      <rect y="184" width="126" height="30" rx="6" fill="#1f2937" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
      <text x="63" y="203" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">Reset Elements</text>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(182, 52)">
      <rect width="496" height="152" rx="10" fill="#0f172a" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1.5"/>
      <text x="20" y="30" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#64748b" letter-spacing="0.05em">DYNAMIC SANDBOX SPECIMEN PREVIEW</text>
      
      <text x="24" y="84" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#10b981" letter-spacing="-0.01em">Pack my box with five dozen liquor jugs.</text>
      <text x="24" y="116" font-family="monospace" font-size="12" font-weight="600" fill="#94a3b8" opacity="0.8">Sphinx of black quartz, judge my vow.</text>

      <g transform="translate(0, 168)">
        <g transform="translate(0, 0)" filter="url(#badgeGlow)">
          <rect width="156" height="106" rx="12" fill="rgba(16, 185, 129, 0.08)" stroke="#10b981" stroke-width="1.5"/>
          <text x="20" y="32" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#10b981" letter-spacing="0.05em">WCAG COMPLIANCE</text>
          <text x="20" y="82" font-family="-apple-system, sans-serif" font-size="44" font-weight="900" fill="#10b981" letter-spacing="-0.03em">PASS</text>
        </g>

        <g transform="translate(176, 0)">
          <rect width="150" height="48" rx="8" fill="#1f2937" opacity="0.4" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
          <circle cx="20" cy="24" r="5" fill="#10b981"/>
          <text x="36" y="22" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#f8fafc">Normal Text</text>
          <text x="36" y="36" font-family="monospace" font-size="9" font-weight="800" fill="#64748b">LEVEL AAA ✔ (4.5:1)</text>
        </g>

        <g transform="translate(176, 58)">
          <rect width="150" height="48" rx="8" fill="#1f2937" opacity="0.4" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
          <circle cx="20" cy="24" r="5" fill="#10b981"/>
          <text x="36" y="22" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#f8fafc">Large Text</text>
          <text x="36" y="36" font-family="monospace" font-size="9" font-weight="800" fill="#64748b">LEVEL AAA ✔ (3.0:1)</text>
        </g>

        <g transform="translate(346, 0)">
          <rect width="150" height="106" rx="10" fill="#1e293b" fill-opacity="0.3" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
          <text x="14" y="22" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">LUMINANCE (Y)</text>
          
          <text x="14" y="52" font-family="monospace" font-size="10" font-weight="700" fill="#94a3b8">Bg_Y: 0.021</text>
          <text x="14" y="72" font-family="monospace" font-size="10" font-weight="700" fill="#94a3b8">Fg_Y: 0.224</text>
          <text x="14" y="90" font-family="monospace" font-size="8" font-weight="700" fill="#3b82f6">(L1 + 0.05)/(L2 + 0.05)</text>
        </g>
      </g>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(4, 6, 10, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">WCAG 2.1 EVALUATOR SUITE</text>
    <circle cx="196" cy="22" r="2" fill="#475569" />
    
    <text x="212" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="262" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="308" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="352" y="13" width="64" height="16" rx="4" fill="rgba(16, 185, 129, 0.08)" stroke="rgba(16, 185, 129, 0.15)" stroke-width="1"/>
    <text x="358" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#10b981" letter-spacing="0.02em">WCAG_21</text>
  </g>
</svg>

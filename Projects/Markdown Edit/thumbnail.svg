<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#05070c"/>
  <rect x="10" y="10" width="300" height="180" rx="8" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- toolbar -->
  <rect x="14" y="14" width="292" height="26" rx="6" fill="rgba(5,7,12,0.85)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <rect x="22" y="20" width="20" height="16" rx="3" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="32" y="33" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#64748b" text-anchor="middle">B</text>
  <rect x="46" y="20" width="18" height="16" rx="3" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="55" y="33" font-family="system-ui, sans-serif" font-size="7" font-style="italic" fill="#64748b" text-anchor="middle">I</text>
  <rect x="68" y="20" width="24" height="16" rx="3" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="80" y="33" font-family="system-ui, sans-serif" font-size="5" fill="#64748b" text-anchor="middle">Link</text>
  <rect x="96" y="20" width="26" height="16" rx="3" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="109" y="33" font-family="system-ui, sans-serif" font-size="5" fill="#64748b" text-anchor="middle">&lt;/&gt;</text>
  <line x1="128" y1="20" x2="128" y2="36" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="136" y="20" width="28" height="16" rx="3" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="150" y="33" font-family="system-ui, sans-serif" font-size="5" fill="#64748b" text-anchor="middle">Clear</text>
  <rect x="168" y="20" width="32" height="16" rx="3" fill="rgba(0,240,255,0.02)" stroke="rgba(0,240,255,0.1)" stroke-width="1"/>
  <text x="184" y="33" font-family="system-ui, sans-serif" font-size="5" fill="#00f0ff" text-anchor="middle">Export</text>
  <!-- split panes -->
  <rect x="14" y="44" width="148" height="126" fill="#05070c" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <rect x="14" y="44" width="148" height="16" fill="rgba(255,255,255,0.01)"/>
  <text x="20" y="56" font-family="system-ui, sans-serif" font-size="4" font-weight="700" fill="#475569">MARKDOWN</text>
  <!-- markdown content -->
  <text x="20" y="72" font-family="monospace" font-size="5" font-weight="700" fill="#e2e8f0"># Hello World</text>
  <text x="20" y="82" font-family="monospace" font-size="5" fill="#64748b">This is **bold** and</text>
  <text x="20" y="92" font-family="monospace" font-size="5" fill="#64748b">*italic* text.</text>
  <text x="20" y="104" font-family="monospace" font-size="5" fill="#64748b">- List item 1</text>
  <text x="20" y="114" font-family="monospace" font-size="5" fill="#64748b">- List item 2</text>
  <text x="20" y="126" font-family="monospace" font-size="5" fill="#64748b">[Link](url)</text>
  <text x="20" y="138" font-family="monospace" font-size="5" fill="#64748b">`code` here</text>
  <rect x="162" y="44" width="148" height="126" fill="#05070c" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <rect x="162" y="44" width="148" height="16" fill="rgba(255,255,255,0.01)"/>
  <text x="168" y="56" font-family="system-ui, sans-serif" font-size="4" font-weight="700" fill="#475569">PREVIEW</text>
  <!-- preview content -->
  <text x="168" y="72" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#e2e8f0">Hello World</text>
  <text x="168" y="84" font-family="system-ui, sans-serif" font-size="5" fill="#64748b">This is <tspan font-weight="700" fill="#e2e8f0">bold</tspan> and</text>
  <text x="168" y="94" font-family="system-ui, sans-serif" font-size="5" fill="#64748b"><tspan font-style="italic">italic</tspan> text.</text>
  <text x="168" y="106" font-family="system-ui, sans-serif" font-size="5" fill="#64748b">• List item 1</text>
  <text x="168" y="116" font-family="system-ui, sans-serif" font-size="5" fill="#64748b">• List item 2</text>
  <text x="168" y="128" font-family="system-ui, sans-serif" font-size="5" fill="#00f0ff">Link</text>
  <rect x="168" y="136" width="22" height="10" rx="2" fill="rgba(255,255,255,0.04)"/>
  <text x="170" y="145" font-family="monospace" font-size="5" fill="#f59e0b">code</text>
  <!-- statusbar -->
  <rect x="14" y="172" width="292" height="16" rx="4" fill="rgba(5,7,12,0.85)" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <text x="20" y="184" font-family="system-ui, sans-serif" font-size="5" fill="#475569">14 words</text>
  <text x="280" y="184" font-family="system-ui, sans-serif" font-size="5" fill="#475569">8 lines</text>
</svg>

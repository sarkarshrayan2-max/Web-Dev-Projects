<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🌀 Path Drawing Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🌀 Path Drawing Puzzle</h1>
    <button id="startBtn">Start Puzzle</button>
    <span id="timer">⏱️ 20s</span>
  </header>

  <main>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="controls">
    <button id="submitBtn">Submit Path</button>
    <button id="resetBtn">🔄 New Game</button>
  </div>
  <div id="result"></div>
  <div id="leaderboard"></div>
</main>


  <script src="script.js"></script>
</body>
</html>

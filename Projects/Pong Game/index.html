<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pong Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="hud-item player">
        <span class="hud-lbl">You</span>
        <span class="hud-val" id="playerScore">0</span>
      </div>
      <div class="hud-item center">
        <span class="hud-lbl">AI Diff</span>
        <span class="hud-val accent" id="diffVal">Medium</span>
      </div>
      <div class="hud-item ai">
        <span class="hud-lbl">AI</span>
        <span class="hud-val" id="aiScore">0</span>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="500" height="320"></canvas>
    </div>

    <div class="legend">
      <span class="key-hint">W/S or ↑↓ move &middot; Click to toggle AI difficulty</span>
    </div>

    <div class="overlay" id="overlay">
      <div class="modal">
        <h2 class="modal-title" id="modalTitle">Victory</h2>
        <div class="mo-stats">
          <div class="mo-row"><span>Final Score</span><span id="moScore">0 - 0</span></div>
          <div class="mo-row"><span>Wins</span><span id="moWins">0</span></div>
          <div class="mo-row"><span>Losses</span><span id="moLosses">0</span></div>
        </div>
        <button class="modal-btn" id="resetBtn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

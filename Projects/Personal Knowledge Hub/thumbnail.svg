<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.1)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" fill="url(#bgGrad)" />

  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="150" fill="#3b82f6" opacity="0.15" filter="url(#glow)" />
  <circle cx="450" cy="250" r="180" fill="#8b5cf6" opacity="0.15" filter="url(#glow)" />

  <!-- Layout Base (App Container) -->
  <g transform="translate(40, 40)" filter="url(#dropShadow)">
    <rect width="420" height="220" rx="12" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
    
    <!-- Sidebar -->
    <rect width="100" height="220" rx="12" fill="rgba(15, 23, 42, 0.6)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    
    <!-- Sidebar Logo Icon -->
    <circle cx="50" cy="30" r="12" fill="url(#accentGrad)" />
    <!-- Sidebar Items -->
    <rect x="25" y="65" width="50" height="8" rx="4" fill="rgba(255,255,255,0.8)" />
    <rect x="25" y="85" width="40" height="8" rx="4" fill="rgba(255,255,255,0.4)" />
    <rect x="25" y="105" width="45" height="8" rx="4" fill="rgba(255,255,255,0.4)" />
    
    <!-- Header -->
    <rect x="115" y="15" width="290" height="30" rx="8" fill="rgba(255,255,255,0.05)" />
    <!-- Search Bar mock -->
    <rect x="130" y="22" width="100" height="16" rx="4" fill="rgba(255,255,255,0.1)" />
    
    <!-- Main Content Grid -->
    <!-- Card 1 -->
    <rect x="115" y="60" width="135" height="70" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <circle cx="135" cy="80" r="8" fill="#3b82f6" />
    <rect x="155" y="76" width="60" height="8" rx="4" fill="rgba(255,255,255,0.8)" />
    <rect x="135" y="96" width="100" height="4" rx="2" fill="rgba(255,255,255,0.4)" />
    <rect x="135" y="106" width="80" height="4" rx="2" fill="rgba(255,255,255,0.4)" />
    <rect x="135" y="116" width="40" height="4" rx="2" fill="rgba(255,255,255,0.4)" />

    <!-- Card 2 -->
    <rect x="265" y="60" width="135" height="70" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <circle cx="285" cy="80" r="8" fill="#10b981" />
    <rect x="305" y="76" width="70" height="8" rx="4" fill="rgba(255,255,255,0.8)" />
    <rect x="285" y="96" width="90" height="4" rx="2" fill="rgba(255,255,255,0.4)" />
    <rect x="285" y="106" width="70" height="4" rx="2" fill="rgba(255,255,255,0.4)" />

    <!-- Card 3 -->
    <rect x="115" y="145" width="135" height="60" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <circle cx="135" cy="165" r="8" fill="#f59e0b" />
    <rect x="155" y="161" width="50" height="8" rx="4" fill="rgba(255,255,255,0.8)" />
    <rect x="135" y="181" width="90" height="4" rx="2" fill="rgba(255,255,255,0.4)" />
    <rect x="135" y="191" width="60" height="4" rx="2" fill="rgba(255,255,255,0.4)" />

    <!-- Card 4 (Bookmark style) -->
    <rect x="265" y="145" width="135" height="60" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <rect x="280" y="160" width="20" height="20" rx="4" fill="#8b5cf6" />
    <rect x="310" y="163" width="70" height="6" rx="3" fill="rgba(255,255,255,0.8)" />
    <rect x="310" y="174" width="50" height="4" rx="2" fill="rgba(255,255,255,0.4)" />
  </g>

  <!-- Overlay Title -->
  <text x="250" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">PERSONAL KNOWLEDGE HUB</text>
</svg>

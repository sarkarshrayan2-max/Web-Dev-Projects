<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03050a" />
      <stop offset="50%" stop-color="#070a12" />
      <stop offset="100%" stop-color="#0e1322" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#f43f5e" flood-opacity="0.02"/>
    </filter>

    <radialGradient id="meshNode1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshNode2" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshNode3" cx="15%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshNode4" cx="85%" cy="80%" r="65%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="meshBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <pattern id="uiGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#uiGrid)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#111827" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(545, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#meshBrand)" />
      <text x="14" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.04em">MESH_ENGINE</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Color Spectrum</text>
      
      <g transform="translate(0, 24)">
        <rect width="126" height="28" rx="6" fill="#1f2937" fill-opacity="0.6" stroke="rgba(244, 63, 94, 0.2)" stroke-width="1"/>
        <circle cx="14" cy="14" r="5" fill="#f43f5e"/>
        <text x="26" y="18" font-family="monospace" font-size="10" font-weight="800" fill="#f8fafc">#F43F5E</text>

        <g transform="translate(0, 36)">
          <rect width="126" height="28" rx="6" fill="#1f2937" fill-opacity="0.6" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1"/>
          <circle cx="14" cy="14" r="5" fill="#3b82f6"/>
          <text x="26" y="18" font-family="monospace" font-size="10" font-weight="800" fill="#f8fafc">#3B82F6</text>
        </g>

        <g transform="translate(0, 72)">
          <rect width="126" height="28" rx="6" fill="#1f2937" fill-opacity="0.6" stroke="rgba(16, 185, 129, 0.2)" stroke-width="1"/>
          <circle cx="14" cy="14" r="5" fill="#10b981"/>
          <text x="26" y="18" font-family="monospace" font-size="10" font-weight="800" fill="#f8fafc">#10B981</text>
        </g>

        <g transform="translate(0, 108)">
          <rect width="126" height="28" rx="6" fill="#1f2937" fill-opacity="0.6" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>
          <circle cx="14" cy="14" r="5" fill="#a855f7"/>
          <text x="26" y="18" font-family="monospace" font-size="10" font-weight="800" fill="#f8fafc">#A855F7</text>
        </g>
      </g>

      <g transform="translate(0, 182)">
        <rect width="126" height="34" rx="6" fill="#1f2937" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>
        <text x="10" y="14" font-family="-apple-system, sans-serif" font-size="7" font-weight="700" fill="#64748b" letter-spacing="0.05em">EXPORT FUNCTION</text>
        <text x="10" y="26" font-family="monospace" font-size="9" font-weight="800" fill="#10b981">Copy CSS Code</text>
      </g>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(182, 52)">
      <rect width="496" height="304" rx="10" fill="#020408" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1.5"/>

      <g>
        <clipPath id="canvasClip">
          <rect width="494" height="302" x="1" y="1" rx="9" />
        </clipPath>
        
        <g clip-path="url(#canvasClip)">
          <rect width="496" height="304" fill="#0c101d"/>
          
          <rect width="496" height="304" fill="url(#meshNode1)" />
          <rect width="496" height="304" fill="url(#meshNode2)" />
          <rect width="496" height="304" fill="url(#meshNode3)" />
          <rect width="496" height="304" fill="url(#meshNode4)" />

          <circle cx="100" cy="60" r="2" fill="#ffffff" opacity="0.3"/>
          <circle cx="396" cy="60" r="2" fill="#ffffff" opacity="0.3"/>
          <circle cx="75" cy="244" r="2" fill="#ffffff" opacity="0.3"/>
          <circle cx="421" cy="244" r="2" fill="#ffffff" opacity="0.3"/>

          <rect x="18" y="18" width="160" height="20" rx="4" fill="rgba(3, 5, 10, 0.8)" stroke="rgba(255,255,255,0.06)" stroke-width="0.75"/>
          <text x="28" y="31" font-family="monospace" font-size="8" font-weight="800" fill="#94a3b8" letter-spacing="0.04em">ψ_STATE: LINEAR_INTERP</text>
        </g>
      </g>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(3, 5, 10, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">GRADIENT MESH GENERATOR</text>
    <circle cx="196" cy="22" r="2" fill="#475569" />
    
    <text x="212" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="262" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="308" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="352" y="13" width="64" height="16" rx="4" fill="rgba(244, 63, 94, 0.08)" stroke="rgba(244, 63, 94, 0.15)" stroke-width="1"/>
    <text x="358" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#f43f5e" letter-spacing="0.02em">RADIAL_CSS</text>
  </g>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Balloon Pop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="hud-item">
        <span class="hud-lbl">Points</span>
        <span class="hud-val" id="scoreVal">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">Multiplier</span>
        <span class="hud-val accent" id="multiVal">1.0×</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">Time</span>
        <span class="hud-val timer" id="timerVal">45</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">Best</span>
        <span class="hud-val" id="bestVal">0</span>
      </div>
    </header>

    <div class="sky" id="sky"></div>

    <div class="overlay" id="overlay">
      <div class="modal">
        <h2 class="modal-title">Time's Up!</h2>
        <div class="mo-stats">
          <div class="mo-row"><span>Balloons Popped</span><span id="moScore">0</span></div>
          <div class="mo-row"><span>High Score</span><span id="moBest">0</span></div>
        </div>
        <button class="modal-btn" id="resetBtn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

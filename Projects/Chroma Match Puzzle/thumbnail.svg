          <rect x="8" y="8" width="30" height="30" rx="4" fill="#a78bfa" />
          <text x="46" y="22" font-family="monospace" font-size="9" font-weight="800" fill="#94a3b8">DECOY</text>
          <text x="46" y="34" font-family="monospace" font-size="8" font-weight="700" fill="#475569">#A78BFA</text>

          <rect x="124" y="0" width="104" height="46" rx="8" fill="#1e293b" opacity="0.6" stroke="#8b5cf6" stroke-width="1.5"/>
          <rect x="132" y="8" width="30" height="30" rx="4" fill="#8b5cf6" />
          <text x="170" y="22" font-family="monospace" font-size="9" font-weight="900" fill="#f8fafc">TARGET</text>
          <text x="170" y="34" font-family="monospace" font-size="8" font-weight="700" fill="#8b5cf6">#8B5CF6</text>

          <rect x="248" y="0" width="104" height="46" rx="8" fill="#1e293b" opacity="0.6" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1"/>
          <rect x="256" y="8" width="30" height="30" rx="4" fill="#7c5df2" />
          <text x="294" y="22" font-family="monospace" font-size="9" font-weight="800" fill="#94a3b8">DECOY</text>
          <text x="294" y="34" font-family="monospace" font-size="8" font-weight="700" fill="#475569">#7C5DF2</text>

          <rect x="372" y="0" width="104" height="46" rx="8" fill="#1e293b" opacity="0.6" stroke="rgba(148, 163, 184, 0.06)" stroke-width="1"/>
          <rect x="380" y="8" width="30" height="30" rx="4" fill="#9d76f7" />
          <text x="418" y="22" font-family="monospace" font-size="9" font-weight="800" fill="#94a3b8">DECOY</text>
          <text x="418" y="34" font-family="monospace" font-size="8" font-weight="700" fill="#475569">#9D76F7</text>
        </g>

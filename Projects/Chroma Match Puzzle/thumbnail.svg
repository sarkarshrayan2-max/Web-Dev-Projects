<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030509" />
      <stop offset="50%" stop-color="#060913" />
      <stop offset="100%" stop-color="#0c1122" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#a855f7" flood-opacity="0.02"/>
    </filter>

    <filter id="specimenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="chromaBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>

    <pattern id="uiGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#uiGrid)" />
  
  <circle cx="680" cy="120" r="190" fill="#a855f7" opacity="0.02" filter="blur(55px)" />
  <circle cx="150" cy="380" r="160" fill="#3b82f6" opacity="0.03" filter="blur(45px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#0f172a" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(560, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#chromaBrand)" />
      <text x="14" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.04em">CHROMA_MATCH</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Chroma Analytics</text>
      
      <rect y="24" width="126" height="24" rx="6" fill="rgba(168, 85, 247, 0.06)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="9" font-weight="800" fill="#a855f7" letter-spacing="0.02em">● VARIANCE_TEST</text>

      <g transform="translate(0, 64)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">CURRENT STREAK</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#10b981">14 Successive</text>
      </g>

      <g transform="translate(0, 118)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">HISTORICAL MAX</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#3b82f6">Record: 42</text>
      </g>

      <rect y="184" width="126" height="32" rx="6" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
      <text x="63" y="204" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#f8fafc" text-anchor="middle">Abort Session</text>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(192, 56)">
      
      <g transform="translate(0, 0)">
        <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="0.05em">CENTRAL TARGET OPTICAL SPECIMEN</text>
        
        <g transform="translate(0, 24)" filter="url(#specimenGlow)">
          <rect width="478" height="96" rx="12" fill="#8b5cf6" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          

          <text x="239" y="49" font-family="monospace" font-size="11" font-weight="800" fill="#f8fafc" text-anchor="middle">#8B5CF6</text>
        </g>
        
        <g transform="translate(0, 134)">
          <rect width="478" height="4" rx="2" fill="#020617"/>
          <rect width="210" height="4" rx="2" fill="url(#timerGrad)"/>
        </g>
      </g>

      <g transform="translate(0, 164)">
        <text x="0" y="12" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#64748b" letter-spacing="0.05em">SHUFFLED RESPONSE MATRICES (MUTATED DECOY HSL CORRIDORS)</text>
        

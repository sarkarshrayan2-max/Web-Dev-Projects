<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080710" />
      <stop offset="100%" stop-color="#0f0d22" />
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Glass Shader -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg-grad)" />

  <!-- Background Ambient Lights -->
  <circle cx="150" cy="150" r="160" fill="#8b5cf6" opacity="0.12" filter="url(#glow)" />
  <circle cx="650" cy="350" r="200" fill="#06b6d4" opacity="0.1" filter="url(#glow)" />

  <!-- Main Grid Board (Glassmorphic) -->
  <g transform="translate(100, 50)" filter="url(#glow)">
    <rect width="600" height="340" rx="16" fill="url(#glass-grad)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1.5" />
    
    <!-- 8x16 sequencer grid nodes -->
    <g transform="translate(40, 40)">
      <!-- Row labels -->
      <circle cx="-15" cy="15" r="5" fill="#f43f5e" />
      <circle cx="-15" cy="45" r="5" fill="#eab308" />
      <circle cx="-15" cy="75" r="5" fill="#10b981" />
      <circle cx="-15" cy="105" r="5" fill="#06b6d4" />
      <circle cx="-15" cy="135" r="5" fill="#a855f7" />

      <!-- Step nodes -->
      <!-- Draw active/inactive buttons -->
      <!-- Row 1 -->
      <rect x="0" y="5" width="24" height="20" rx="4" fill="url(#accent-purple)" />
      <rect x="35" y="5" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="70" y="5" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="105" y="5" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="140" y="5" width="24" height="20" rx="4" fill="url(#accent-purple)" />
      <rect x="175" y="5" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="210" y="5" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="245" y="5" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="280" y="5" width="24" height="20" rx="4" fill="url(#accent-purple)" />
      <rect x="315" y="5" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />

      <!-- Row 2 -->
      <rect x="0" y="35" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="35" y="35" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="70" y="35" width="24" height="20" rx="4" fill="url(#accent-cyan)" />
      <rect x="105" y="35" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="140" y="35" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="175" y="35" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="210" y="35" width="24" height="20" rx="4" fill="url(#accent-cyan)" />
      <rect x="245" y="35" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="280" y="35" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="315" y="35" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />

      <!-- Row 3 -->
      <rect x="0" y="65" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="35" y="65" width="24" height="20" rx="4" fill="url(#accent-purple)" />
      <rect x="70" y="65" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="105" y="65" width="24" height="20" rx="4" fill="url(#accent-purple)" />
      <rect x="140" y="65" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="175" y="65" width="24" height="20" rx="4" fill="url(#accent-purple)" />
      <rect x="210" y="65" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="245" y="65" width="24" height="20" rx="4" fill="url(#accent-purple)" />
      <rect x="280" y="65" width="24" height="20" rx="4" fill="rgba(255,255,255,0.06)" />
      <rect x="315" y="65" width="24" height="20" rx="4" fill="url(#accent-purple)" />

      <!-- Scanning Playhead overlay bar -->
      <rect x="67" y="-5" width="30" height="170" rx="6" fill="rgba(99, 102, 241, 0.15)" stroke="#6366f1" stroke-width="1.5" />
    </g>

    <!-- Oscilloscope visualizer waveform panel inside Synth dashboard -->
    <g transform="translate(400, 40)">
      <rect width="160" height="150" rx="8" fill="rgba(10, 10, 15, 0.8)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
      <path d="M 10 75 Q 30 20 50 75 T 90 75 T 130 110 T 150 75" fill="none" stroke="url(#accent-cyan)" stroke-width="2.5" stroke-linecap="round" />
      <path d="M 10 75 Q 30 40 50 75 T 90 75 T 130 90 T 150 75" fill="none" stroke="url(#accent-purple)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    </g>

    <!-- Mini Piano Keyboard layout -->
    <g transform="translate(40, 230)">
      <!-- White Keys -->
      <rect x="0" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="29" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="58" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="87" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="116" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="145" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="174" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="203" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="232" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="261" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />
      <rect x="290" y="0" width="30" height="70" rx="3" fill="#ffffff" stroke="#1e1b4b" stroke-width="1.5" />

      <!-- Active C4 key visual highlight -->
      <rect x="0" y="0" width="30" height="70" rx="3" fill="url(#accent-purple)" stroke="#1e1b4b" stroke-width="1.5" opacity="0.6" />

      <!-- Black Keys -->
      <rect x="19" y="0" width="18" height="42" rx="2" fill="#0f0d22" />
      <rect x="49" y="0" width="18" height="42" rx="2" fill="#0f0d22" />
      <rect x="107" y="0" width="18" height="42" rx="2" fill="#0f0d22" />
      <rect x="136" y="0" width="18" height="42" rx="2" fill="#0f0d22" />
      <rect x="165" y="0" width="18" height="42" rx="2" fill="#0f0d22" />
      <rect x="222" y="0" width="18" height="42" rx="2" fill="#0f0d22" />
      <rect x="251" y="0" width="18" height="42" rx="2" fill="#0f0d22" />
    </g>

    <!-- EQ Faders Mock UI -->
    <g transform="translate(400, 230)" fill="rgba(255,255,255,0.06)">
      <!-- slider 1 -->
      <rect x="0" y="0" width="20" height="70" rx="4" />
      <rect x="6" y="25" width="8" height="40" rx="2" fill="url(#accent-cyan)" />
      <circle cx="10" cy="25" r="6" fill="#22d3ee" />

      <!-- slider 2 -->
      <rect x="35" y="0" width="20" height="70" rx="4" />
      <rect x="41" y="10" width="8" height="50" rx="2" fill="url(#accent-purple)" />
      <circle cx="45" cy="10" r="6" fill="#a855f7" />

      <!-- slider 3 -->
      <rect x="70" y="0" width="20" height="70" rx="4" />
      <rect x="76" y="45" width="8" height="20" rx="2" fill="url(#accent-cyan)" />
      <circle cx="80" cy="45" r="6" fill="#22d3ee" />

      <!-- knobs -->
      <circle cx="135" cy="15" r="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" />
      <line x1="135" y1="15" x2="143" y2="7" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" />
      <text x="135" y="42" fill="#9ca3af" font-family="'Space Grotesk', sans-serif" font-size="8" text-anchor="middle">TEMPO</text>

      <circle cx="135" cy="55" r="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" />
      <line x1="135" y1="55" x2="127" y2="47" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" />
      <text x="135" y="82" fill="#9ca3af" font-family="'Space Grotesk', sans-serif" font-size="8" text-anchor="middle">REVERB</text>
    </g>
  </g>

  <!-- Title Text at Bottom -->
  <text x="400" y="460" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="0.5">AUDIO SYNTHESIZER &amp; BEAT SEQUENCER</text>
</svg>

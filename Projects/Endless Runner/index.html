<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Endless Runner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="hud-item">
        <span class="hud-lbl">Distance</span>
        <span class="hud-val" id="scoreVal">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">Speed</span>
        <span class="hud-val accent" id="speedVal">1.0×</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">Best</span>
        <span class="hud-val" id="bestVal">0</span>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="360" height="400"></canvas>
    </div>

    <p class="hint">Space / Up / Tap to jump</p>

    <div class="overlay" id="overlay">
      <div class="modal">
        <h2 class="modal-title">Crash</h2>
        <div class="mo-stats">
          <div class="mo-row"><span>Distance</span><span id="moScore">0</span></div>
          <div class="mo-row"><span>Best Score</span><span id="moBest">0</span></div>
        </div>
        <button class="modal-btn" id="resetBtn">Run Again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="100%" stop-color="#14141f" />
    </linearGradient>

    <!-- Invader Colors -->
    <linearGradient id="invader-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg-grad)" />

  <!-- Pixel Grid Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.03">
    <!-- Grid -->
    <path d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175 M 0,200 L 800,200 M 0,225 L 800,225 M 0,250 L 800,250 M 0,275 L 800,275 M 0,300 L 800,300 M 0,325 L 800,325 M 0,350 L 800,350 M 0,375 L 800,375 M 0,400 L 800,400 M 0,425 L 800,425 M 0,450 L 800,450" />
    <path d="M 25,0 L 25,500 M 50,0 L 50,500 M 75,0 L 75,500 M 100,0 L 100,500 M 125,0 L 125,500 M 150,0 L 150,500 M 175,0 L 175,500 M 200,0 L 200,500 M 225,0 L 225,500 M 250,0 L 250,500 M 275,0 L 275,500 M 300,0 L 300,500 M 325,0 L 325,500 M 350,0 L 350,500 M 375,0 L 375,500 M 400,0 L 400,500 M 425,0 L 425,500 M 450,0 L 450,500 M 475,0 L 475,500 M 500,0 L 500,500 M 525,0 L 525,500 M 550,0 L 550,500 M 575,0 L 575,500 M 600,0 L 600,500 M 625,0 L 625,500 M 650,0 L 650,500 M 675,0 L 675,500 M 700,0 L 700,500 M 725,0 L 725,500 M 750,0 L 750,500 M 775,0 L 775,500" />
  </g>

  <!-- Large Interactive Canvas Preview Block -->
  <g transform="translate(180, 50)" filter="url(#glow)">
    <!-- Main Drawing Grid Border -->
    <rect width="440" height="340" rx="12" fill="rgba(20, 20, 35, 0.75)" stroke="rgba(168, 85, 247, 0.3)" stroke-width="2" />
    
    <!-- Invader Sprite Pixel Art (Symmetric Grid Drawing) -->
    <!-- Grid Cells Size 20x20 -->
    <g fill="url(#invader-grad)" opacity="0.9">
      <!-- Row 2 -->
      <rect x="160" y="40" width="20" height="20" />
      <rect x="260" y="40" width="20" height="20" />
      
      <!-- Row 3 -->
      <rect x="140" y="60" width="20" height="20" />
      <rect x="180" y="60" width="20" height="20" />
      <rect x="240" y="60" width="20" height="20" />
      <rect x="280" y="60" width="20" height="20" />
      
      <!-- Row 4 -->
      <rect x="140" y="80" width="20" height="20" />
      <rect x="180" y="80" width="20" height="20" />
      <rect x="200" y="80" width="20" height="20" />
      <rect x="220" y="80" width="20" height="20" />
      <rect x="240" y="80" width="20" height="20" />
      <rect x="280" y="80" width="20" height="20" />
      
      <!-- Row 5 (Eyes block) -->
      <rect x="120" y="100" width="40" height="20" />
      <!-- Eye space -->
      <rect x="180" y="100" width="80" height="20" />
      <!-- Eye space -->
      <rect x="280" y="100" width="40" height="20" />
      
      <!-- Row 6 -->
      <rect x="100" y="120" width="240" height="20" />
      
      <!-- Row 7 -->
      <rect x="100" y="140" width="20" height="20" />
      <rect x="140" y="140" width="160" height="20" />
      <rect x="320" y="140" width="20" height="20" />
      
      <!-- Row 8 -->
      <rect x="100" y="160" width="20" height="20" />
      <rect x="140" y="160" width="20" height="20" />
      <rect x="280" y="160" width="20" height="20" />
      <rect x="320" y="160" width="20" height="20" />
      
      <!-- Row 9 -->
      <rect x="160" y="180" width="40" height="20" />
      <rect x="240" y="180" width="40" height="20" />
    </g>

    <!-- Eyes (Glow Green) -->
    <g fill="#10b981">
      <rect x="160" y="100" width="20" height="20" />
      <rect x="260" y="100" width="20" height="20" />
    </g>

    <!-- Drawing UI Cursor -->
    <rect x="200" y="80" width="20" height="20" fill="none" stroke="#3b82f6" stroke-width="2.5" />
    <line x1="200" y1="75" x2="200" y2="105" stroke="#3b82f6" stroke-width="1.5" />
    <line x1="195" y1="80" x2="225" y2="80" stroke="#3b82f6" stroke-width="1.5" />
  </g>

  <!-- Left Config Tool Overlay Mockup -->
  <g transform="translate(30, 80)" opacity="0.9">
    <rect width="130" height="150" rx="8" fill="rgba(15, 23, 42, 0.85)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
    <text x="15" y="25" fill="#a855f7" font-family="'Inter', sans-serif" font-size="10" font-weight="900" letter-spacing="1">GENERATOR</text>
    
    <rect x="15" y="42" width="100" height="24" rx="4" fill="#6b21a8" />
    <text x="65" y="58" fill="#ffffff" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">⚡ GENERATE</text>
    
    <!-- sliders -->
    <text x="15" y="90" fill="#9ca3af" font-family="'Inter', sans-serif" font-size="9">Grid Symmetry</text>
    <rect x="15" y="96" width="100" height="4" rx="2" fill="rgba(255,255,255,0.1)" />
    <circle cx="75" cy="98" r="5" fill="#a855f7" />

    <text x="15" y="122" fill="#9ca3af" font-family="'Inter', sans-serif" font-size="9">Random Seed</text>
    <rect x="15" y="128" width="100" height="14" rx="3" fill="rgba(0,0,0,0.3)" />
    <text x="22" y="138" fill="#10b981" font-family="monospace" font-size="8">#px-90a4</text>
  </g>

  <!-- Right Timeline Frames Overlay Mockup -->
  <g transform="translate(640, 80)" opacity="0.9">
    <rect width="130" height="240" rx="8" fill="rgba(15, 23, 42, 0.85)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
    <text x="15" y="25" fill="#a855f7" font-family="'Inter', sans-serif" font-size="10" font-weight="900" letter-spacing="1">ANIM TIMELINE</text>

    <!-- Frame 1 -->
    <rect x="15" y="45" width="40" height="40" rx="4" fill="rgba(255,255,255,0.04)" stroke="#a855f7" stroke-width="1.5" />
    <path d="M 28,55 L 33,65 L 38,60 M 30,75 L 40,75" stroke="#a855f7" stroke-width="2" fill="none" stroke-linecap="round" />
    <text x="65" y="68" fill="#ffffff" font-family="'Inter', sans-serif" font-size="9" font-weight="bold">Frame 1</text>

    <!-- Frame 2 -->
    <rect x="15" y="100" width="40" height="40" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" />
    <path d="M 28,110 L 33,120 L 38,115" stroke="#9ca3af" stroke-width="2" fill="none" stroke-linecap="round" />
    <text x="65" y="123" fill="#9ca3af" font-family="'Inter', sans-serif" font-size="9">Frame 2</text>

    <!-- Frame 3 -->
    <rect x="15" y="155" width="40" height="40" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" />
    <text x="65" y="178" fill="#9ca3af" font-family="'Inter', sans-serif" font-size="9">Frame 3</text>

    <!-- Frame Play -->
    <rect x="15" y="205" width="100" height="22" rx="4" fill="#1e1b4b" stroke="rgba(168, 85, 247, 0.2)" />
    <text x="65" y="219" fill="#a855f7" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" text-anchor="middle">▶ PLAY PREVIEW</text>
  </g>

  <!-- Title Text at Bottom -->
  <text x="400" y="460" fill="#ffffff" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="1">PROCEDURAL SPRITE GENERATOR &amp; ART STUDIO</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060b" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0e1322" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.80"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.02"/>
    </filter>

    <filter id="sliderGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="focusBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <pattern id="uiGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.02)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#uiGrid)" />
  
  <circle cx="680" cy="120" r="180" fill="#a855f7" opacity="0.02" filter="blur(50px)" />
  <circle cx="150" cy="380" r="160" fill="#3b82f6" opacity="0.03" filter="blur(45px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#111827" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(560, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#focusBrand)" />
      <text x="14" y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.04em">FOCUS_BEATS</text>
    </g>

    <g transform="translate(25, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Focus Core</text>
      
      <rect y="26" width="94" height="20" rx="4" fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1"/>
      <text x="47" y="39" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#3b82f6" letter-spacing="0.05em" text-anchor="middle">● DEEP WORK SESSION</text>

      <text x="0" y="112" font-family="monospace" font-size="44" font-weight="800" fill="#f8fafc" letter-spacing="-0.02em">24:58</text>

      <g transform="translate(0, 140)">
        <rect width="52" height="26" rx="6" fill="#1f2937" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
        <text x="26" y="16" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#10b981" text-anchor="middle">Play</text>
        
        <rect x="60" y="0" width="52" height="26" rx="6" fill="#1f2937" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
        <text x="86" y="16" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#94a3b8" text-anchor="middle">Reset</text>
      </g>

      <g transform="translate(0, 194)">
        <rect width="112" height="34" rx="6" fill="#1e293b" opacity="0.4" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="14" font-family="-apple-system, sans-serif" font-size="7" font-weight="700" fill="#475569" letter-spacing="0.05em">COMPLETED CYCLES</text>
        <text x="10" y="27" font-family="monospace" font-size="11" font-weight="800" fill="#a855f7">03 Intervals</text>
      </g>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(192, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Acoustic Ambient Mixer</text>
      <text x="0" y="26" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#475569">MATH-SYNTHESIZED CHANNELS (ZERO EXTERNAL CODECS)</text>

      <g transform="translate(0, 48)">
        <rect width="478" height="42" rx="8" fill="#1f2937" opacity="0.4" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="16" y="24" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">🌧  Rain Droplets</text>
        
        <g transform="translate(160, 19)" filter="url(#sliderGlow)">
          <rect width="240" height="4" rx="2" fill="#111827"/>
          <rect width="180" height="4" rx="2" fill="#3b82f6"/>
          <circle cx="180" cy="2" r="6" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
        </g>
        <text x="462" y="25" font-family="monospace" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="end">75%</text>
      </g>

      <g transform="translate(0, 100)">
        <rect width="478" height="42" rx="8" fill="#1f2937" opacity="0.4" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="16" y="24" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">☕  Café Chatter</text>
        
        <g transform="translate(160, 19)">
          <rect width="240" height="4" rx="2" fill="#111827"/>
          <rect width="96" height="4" rx="2" fill="#a855f7"/>
          <circle cx="96" cy="2" r="5" fill="#f8fafc" stroke="#a855f7" stroke-width="1.5"/>
        </g>
        <text x="462" y="25" font-family="monospace" font-size="10" font-weight="700" fill="#a855f7" text-anchor="end">40%</text>
      </g>

      <g transform="translate(0, 152)">
        <rect width="478" height="42" rx="8" fill="#1f2937" opacity="0.4" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="16" y="24" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">🌊  White Noise</text>
        
        <g transform="translate(160, 19)">
          <rect width="240" height="4" rx="2" fill="#111827"/>
          <rect width="0" height="4" rx="2" fill="#475569"/>
          <circle cx="0" cy="2" r="5" fill="#1f2937" stroke="#475569" stroke-width="1"/>
        </g>
        <text x="462" y="25" font-family="monospace" font-size="10" font-weight="700" fill="#475569" text-anchor="end">MUTE</text>
      </g>

      <g transform="translate(0, 204)">
        <rect width="478" height="42" rx="8" fill="#1f2937" opacity="0.4" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="16" y="24" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">🚂  Train Tracks</text>
        
        <g transform="translate(160, 19)">
          <rect width="240" height="4" rx="2" fill="#111827"/>
          <rect width="144" height="4" rx="2" fill="#3b82f6"/>
          <circle cx="144" cy="2" r="5" fill="#f8fafc" stroke="#3b82f6" stroke-width="1.5"/>
        </g>
        <text x="462" y="25" font-family="monospace" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="end">60%</text>
      </g>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(4, 6, 11, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">AMBIENT PRODUCTIVITY MODULE</text>
    <circle cx="196" cy="22" r="2" fill="#475569" />
    
    <text x="212" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="262" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="308" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="352" y="13" width="64" height="16" rx="4" fill="rgba(168, 85, 247, 0.08)" stroke="rgba(168, 85, 247, 0.15)" stroke-width="1"/>
    <text x="358" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#a855f7" letter-spacing="0.02em">WEB_AUDIO</text>
  </g>
</svg>

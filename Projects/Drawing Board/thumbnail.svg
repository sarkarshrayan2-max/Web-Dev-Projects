<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#07080f"/>
  <rect x="10" y="10" width="300" height="180" rx="8" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- toolbar -->
  <rect x="14" y="14" width="292" height="32" rx="8" fill="rgba(7,8,15,0.85)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- color swatch -->
  <rect x="22" y="20" width="22" height="22" rx="4" fill="#10b981" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <!-- quick colors -->
  <circle cx="54" cy="31" r="7" fill="#10b981"/>
  <circle cx="72" cy="31" r="7" fill="#00f0ff"/>
  <circle cx="90" cy="31" r="7" fill="#f59e0b"/>
  <circle cx="108" cy="31" r="7" fill="#ef4444"/>
  <circle cx="126" cy="31" r="7" fill="#8b5cf6"/>
  <circle cx="144" cy="31" r="7" fill="#ffffff" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="162" cy="31" r="7" fill="#000000" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- size slider -->
  <text x="180" y="30" font-family="system-ui, sans-serif" font-size="5" fill="#64748b">Size</text>
  <line x1="200" y1="31" x2="230" y2="31" stroke="rgba(255,255,255,0.06)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="212" cy="31" r="5" fill="#10b981" stroke="#07080f" stroke-width="2"/>
  <text x="234" y="30" font-family="system-ui, sans-serif" font-size="5" font-weight="700" fill="#64748b">4</text>
  <!-- tool buttons -->
  <rect x="250" y="20" width="30" height="20" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="265" y="34" font-family="system-ui, sans-serif" font-size="5" font-weight="600" fill="#64748b" text-anchor="middle">Erase</text>
  <rect x="284" y="20" width="18" height="20" rx="4" fill="rgba(0,240,255,0.03)" stroke="rgba(0,240,255,0.15)" stroke-width="1"/>
  <text x="293" y="34" font-family="system-ui, sans-serif" font-size="5" font-weight="600" fill="#00f0ff" text-anchor="middle">PNG</text>
  <!-- canvas area drawing -->
  <path d="M 30 80 Q 60 60 90 90 T 150 75 T 210 95 T 270 70" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M 40 110 Q 70 100 100 130 T 160 110 T 220 140 T 280 115" fill="none" stroke="#00f0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <path d="M 50 145 Q 80 160 120 140 T 180 160 T 260 145" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- statusbar -->
  <rect x="14" y="170" width="292" height="16" rx="4" fill="rgba(7,8,15,0.85)" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <text x="20" y="182" font-family="system-ui, sans-serif" font-size="5" fill="#475569">Brush</text>
  <text x="280" y="182" font-family="system-ui, sans-serif" font-size="5" fill="#475569">0, 0</text>
</svg>

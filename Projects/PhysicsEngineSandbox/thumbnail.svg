<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glowing Accents -->
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>

    <linearGradient id="accent-rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fda4af" />
    </linearGradient>

    <!-- Glass Overlay -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg-grad)" />

  <!-- Background Ambient Glows -->
  <circle cx="250" cy="180" r="180" fill="#8b5cf6" opacity="0.1" filter="url(#glow)" />
  <circle cx="550" cy="320" r="220" fill="#06b6d4" opacity="0.1" filter="url(#glow)" />

  <!-- Main Simulator Container (Glassmorphic) -->
  <g transform="translate(120, 60)" filter="url(#glow)">
    <rect width="560" height="320" rx="16" fill="url(#glass-grad)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1.5" />
    
    <!-- Vector Grid -->
    <g stroke="rgba(255, 255, 255, 0.02)" stroke-width="1">
      <line x1="0" y1="80" x2="560" y2="80" />
      <line x1="0" y1="160" x2="560" y2="160" />
      <line x1="0" y1="240" x2="560" y2="240" />
      <line x1="140" y1="0" x2="140" y2="320" />
      <line x1="280" y1="0" x2="280" y2="320" />
      <line x1="420" y1="0" x2="420" y2="320" />
    </g>

    <!-- Drawn Line Barriers -->
    <line x1="50" y1="250" x2="220" y2="290" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
    <line x1="280" y1="150" x2="500" y2="220" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />

    <!-- Bouncing particles -->
    <!-- Particle 1: Purple -->
    <circle cx="120" cy="120" r="24" fill="url(#accent-purple)" filter="url(#glow)" />
    <path d="M 120 120 L 120 80" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)" />
    <text x="120" y="72" fill="#c084fc" font-family="monospace" font-size="10" text-anchor="middle">v: [0, -4.2]</text>

    <!-- Particle 2: Cyan (Colliding with barrier) -->
    <circle cx="380" cy="180" r="30" fill="url(#accent-cyan)" filter="url(#glow)" />
    <!-- Impact velocity vector line -->
    <path d="M 380 180 L 415 130" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="4" stroke-linecap="round" />
    <path d="M 380 180 L 350 220" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" />
    <!-- Impact rings -->
    <ellipse cx="363" cy="202" rx="12" ry="4" transform="rotate(-30 363 202)" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7" />

    <!-- Particle 3: Rose -->
    <circle cx="480" cy="100" r="18" fill="url(#accent-rose)" filter="url(#glow)" />
    
    <!-- Tether String (Spring Constraint) between particles 2 and 3 -->
    <path d="M 380 180 L 480 100" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="3,3" />

    <!-- Vector Arrow Def -->
    <g fill="#22d3ee">
      <polygon points="348,223 354,212 342,217" />
    </g>
  </g>

  <!-- Title Text at Bottom -->
  <text x="400" y="450" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="0.5">2D PHYSICS ENGINE SANDBOX</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020306" />
      <stop offset="50%" stop-color="#060913" />
      <stop offset="100%" stop-color="#0c1224" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.03"/>
    </filter>

    <filter id="pathGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="trailBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <pattern id="labGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148, 163, 184, 0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#labGrid)" />
  
  <circle cx="650" cy="380" r="180" fill="#a855f7" opacity="0.02" filter="blur(55px)" />
  <circle cx="150" cy="120" r="160" fill="#3b82f6" opacity="0.03" filter="blur(45px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#0f172a" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(550, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#trailBrand)" />
      <text x="14" y="10" font-family="monospace" font-size="11" font-weight="900" fill="#f8fafc" letter-spacing="0.05em">TRAIL_MAKING_LAB</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Assessment Logs</text>
      
      <rect y="24" width="126" height="24" rx="6" fill="rgba(168, 85, 247, 0.06)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="9" font-weight="800" fill="#a855f7" letter-spacing="0.02em">MODE: 1-A-2-B ALT</text>

      <g transform="translate(0, 64)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">PROCESSING SPEED</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#3b82f6">Time: 14.82s</text>
      </g>

      <g transform="translate(0, 118)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">ERROR COEFFICIENT</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#10b981">00 Incursions</text>
      </g>

      <rect y="184" width="126" height="32" rx="6" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
      <text x="63" y="204" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#f8fafc" text-anchor="middle">Scramble Layout</text>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(182, 52)">
      <rect width="496" height="304" rx="10" fill="#03050b" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1.5"/>

      <g filter="url(#pathGlow)">
        <path d="M 80 80 L 260 210 L 140 160" fill="none" stroke="url(#trailBrand)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <g transform="translate(80, 80)">
        <circle r="15" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
        <text y="4" font-family="monospace" font-size="11" font-weight="900" fill="#3b82f6" text-anchor="middle">1</text>
      </g>

      <g transform="translate(260, 210)">
        <circle r="15" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
        <text y="4" font-family="monospace" font-size="11" font-weight="900" fill="#a855f7" text-anchor="middle">A</text>
      </g>

      <g transform="translate(140, 160)">
        <circle r="15" fill="rgba(236, 72, 153, 0.12)" stroke="#ec4899" stroke-width="2"/>
        <text y="4" font-family="monospace" font-size="11" font-weight="900" fill="#ec4899" text-anchor="middle">2</text>
        <circle r="20" fill="none" stroke="#ec4899" stroke-width="0.5" stroke-dasharray="2 2"/>
      </g>

      <g transform="translate(380, 100)">
        <circle r="15" fill="#0f172a" stroke="rgba(148, 163, 184, 0.2)" stroke-width="1"/>
        <text y="4" font-family="monospace" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle">B</text>
      </g>

      <g transform="translate(420, 240)">
        <circle r="15" fill="#0f172a" stroke="rgba(148, 163, 184, 0.2)" stroke-width="1"/>
        <text y="4" font-family="monospace" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle">3</text>
      </g>

      <g transform="translate(200, 40)">
        <circle r="15" fill="#0f172a" stroke="rgba(148, 163, 184, 0.2)" stroke-width="1"/>
        <text y="4" font-family="monospace" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle">C</text>
      </g>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(2, 3, 6, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">EXECUTIVE FUNCTION TRACKER</text>
    <circle cx="204" cy="22" r="2" fill="#475569" />
    
    <text x="220" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="270" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="316" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="360" y="13" width="56" height="16" rx="4" fill="rgba(168, 85, 247, 0.08)" stroke="rgba(168, 85, 247, 0.15)" stroke-width="1"/>
    <text x="366" y="24" font-family="-apple-system, sans-serif" font-size="8" font-weight="800" fill="#a855f7" letter-spacing="0.02em">TRAIL_ALT</text>
  </g>
</svg>

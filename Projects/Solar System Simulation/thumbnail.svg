  <circle cx="820" cy="360" r="100" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <circle cx="820" cy="360" r="145" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <circle cx="820" cy="360" r="195" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <circle cx="820" cy="360" r="250" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <circle cx="820" cy="360" r="22" fill="#FDB813"/>
  <circle cx="820" cy="360" r="30" fill="none" stroke="rgba(253,184,19,0.3)" stroke-width="2"/>
  <circle cx="890" cy="360" r="5" fill="url(#mercuryGrad)"/>
  <circle cx="800" cy="260" r="7" fill="url(#venusGrad)"/>
  <circle cx="965" cy="360" r="8" fill="url(#earthGrad)"/>
  <circle cx="820" cy="555" r="6" fill="url(#marsGrad)"/>
  <circle cx="770" cy="115" r="14" fill="url(#jupiterGrad)"/>
  <circle cx="965" cy="360" r="13" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="965" cy="360" r="16" fill="none" stroke="rgba(16,185,129,0.2)" stroke-width="5"/>
  <text x="890" y="375" fill="#94a3b8" font-family="monospace" font-size="9" text-anchor="middle">Mercury</text>
  <text x="800" y="277" fill="#94a3b8" font-family="monospace" font-size="9" text-anchor="middle">Venus</text>
  <text x="965" y="380" fill="#94a3b8" font-family="monospace" font-size="9" text-anchor="middle">Earth</text>
  <text x="820" y="571" fill="#94a3b8" font-family="monospace" font-size="9" text-anchor="middle">Mars</text>
  <text x="770" y="139" fill="#94a3b8" font-family="monospace" font-size="9" text-anchor="middle">Jupiter</text>
  <text x="820" y="670" fill="#64748b" font-family="monospace" font-size="12" text-anchor="middle" letter-spacing="2">SOLAR SYSTEM SIMULATION</text>

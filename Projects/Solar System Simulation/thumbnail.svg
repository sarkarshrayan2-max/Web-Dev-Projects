<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDB813" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#FDB813" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FDB813" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mercuryGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#b5b5b5"/>
    </radialGradient>
    <radialGradient id="venusGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e8cda0"/>
    </radialGradient>
    <radialGradient id="earthGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6db3e0"/>
      <stop offset="100%" stop-color="#4b8bbe"/>
    </radialGradient>
    <radialGradient id="marsGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e06030"/>
      <stop offset="100%" stop-color="#c1440e"/>
    </radialGradient>
    <radialGradient id="jupiterGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e8c8a0"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </radialGradient>

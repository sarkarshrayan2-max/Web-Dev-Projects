  <rect width="1280" height="720" fill="#070a13"/>
  <rect x="0" y="0" width="360" height="720" fill="#111827" rx="0"/>
  <rect x="360" y="0" width="2" height="720" fill="#1f2937"/>
  <text x="40" y="60" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="1.5">ORBITAL MECHANICS</text>
  <text x="40" y="80" fill="#94a3b8" font-family="monospace" font-size="11" letter-spacing="1">Solar System Engine</text>
  <rect x="30" y="110" width="300" height="120" fill="rgba(26,31,46,0.8)" rx="8"/>
  <rect x="30" y="250" width="300" height="90" fill="rgba(26,31,46,0.8)" rx="8"/>
  <text x="40" y="272" fill="#64748b" font-family="monospace" font-size="11" letter-spacing="1">LIVE TELEMETRY</text>
  <text x="40" y="300" fill="#64748b" font-family="monospace" font-size="10">SPEED MULTIPLIER</text>
  <text x="315" y="300" fill="#f8fafc" font-family="monospace" font-size="12" text-anchor="end">1.0x</text>
  <text x="40" y="320" fill="#64748b" font-family="monospace" font-size="10">SIMULATION TIME</text>
  <text x="315" y="320" fill="#f8fafc" font-family="monospace" font-size="12" text-anchor="end">00:00:00</text>
  <rect x="30" y="360" width="300" height="330" fill="rgba(26,31,46,0.8)" rx="8"/>
  <text x="40" y="382" fill="#64748b" font-family="monospace" font-size="11" letter-spacing="1">SELECTED BODY DOSSIER</text>
  <text x="40" y="420" fill="#64748b" font-family="monospace" font-size="10">NAME</text>
  <text x="40" y="436" fill="#f8fafc" font-family="monospace" font-size="13">Earth</text>
  <line x1="40" y1="446" x2="310" y2="446" stroke="rgba(31,41,55,0.5)" stroke-width="1"/>
  <text x="40" y="468" fill="#64748b" font-family="monospace" font-size="10">ORBITAL PERIOD</text>
  <text x="40" y="484" fill="#f8fafc" font-family="monospace" font-size="13">365.25 days</text>
  <line x1="40" y1="494" x2="310" y2="494" stroke="rgba(31,41,55,0.5)" stroke-width="1"/>
  <text x="40" y="516" fill="#64748b" font-family="monospace" font-size="10">DISTANCE FROM STAR</text>
  <text x="40" y="532" fill="#f8fafc" font-family="monospace" font-size="13">1.00 AU</text>
  <line x1="40" y1="542" x2="310" y2="542" stroke="rgba(31,41,55,0.5)" stroke-width="1"/>
  <text x="40" y="564" fill="#64748b" font-family="monospace" font-size="10">FUN FACT</text>
  <text x="40" y="582" fill="#f8fafc" font-family="monospace" font-size="12">The only known planet to</text>
  <text x="40" y="600" fill="#f8fafc" font-family="monospace" font-size="12">harbor life, with 71% of its</text>
  <text x="40" y="618" fill="#f8fafc" font-family="monospace" font-size="12">surface covered in water.</text>
  <circle cx="820" cy="360" r="260" fill="url(#sunGlow)"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#05060b"/>
  <!-- top bar -->
  <rect x="4" y="4" width="312" height="16" rx="5" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="10" y="15" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#00f0ff">Avatar Generator</text>
  <text x="240" y="15" font-family="system-ui,sans-serif" font-size="5" fill="#64748b">Variants:</text>
  <text x="282" y="15" font-family="monospace" font-size="6" fill="#00f0ff">12</text>

  <!-- preview panel -->
  <rect x="4" y="24" width="132" height="172" rx="6" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="10" y="33" font-family="system-ui,sans-serif" font-size="5" font-weight="700" fill="#475569" letter-spacing="0.5">LIVE AVATAR</text>
  <!-- avatar circle -->
  <rect x="28" y="42" width="84" height="84" rx="12" fill="rgba(255,255,255,0.005)"/>
  <!-- face -->
  <ellipse cx="70" cy="78" rx="24" ry="27" fill="#f5d6b8" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
  <!-- shoulders -->
  <path d="M32 130 Q32 118 44 114 Q56 110 70 108 Q84 110 96 114 Q108 118 108 130 Z" fill="#1a1d2e"/>
  <!-- eyes -->
  <circle cx="60" cy="74" r="2.5" fill="#1a1a2e"/>
  <circle cx="80" cy="74" r="2.5" fill="#1a1a2e"/>
  <!-- mouth -->
  <path d="M64 86 Q70 92 76 86" fill="none" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  <!-- hair -->
  <path d="M46 78 Q44 56 56 48 Q70 40 84 42 Q92 46 94 56 Q96 66 92 76 Q90 70 82 66 Q74 62 66 62 Q58 63 52 68 Q48 72 46 78Z" fill="#1a1a2e"/>
  <!-- beanie pom -->
  <circle cx="70" cy="44" r="3" fill="#1a1a2e"/>

  <!-- controls panel -->
  <rect x="140" y="24" width="176" height="172" rx="6" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="146" y="33" font-family="system-ui,sans-serif" font-size="5" font-weight="700" fill="#475569" letter-spacing="0.5">CUSTOMIZE</text>

  <text x="146" y="46" font-family="system-ui,sans-serif" font-size="5" font-weight="600" fill="#64748b">FACE SHAPE</text>
  <rect x="146" y="48" width="30" height="12" rx="3" fill="rgba(0,240,255,0.04)" stroke="#00f0ff" stroke-width="0.5"/>
  <text x="154" y="57" font-family="system-ui,sans-serif" font-size="5" fill="#00f0ff">Oval</text>
  <rect x="180" y="48" width="30" height="12" rx="3" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="188" y="57" font-family="system-ui,sans-serif" font-size="5" fill="#94a3b8">Round</text>
  <rect x="214" y="48" width="30" height="12" rx="3" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="222" y="57" font-family="system-ui,sans-serif" font-size="5" fill="#94a3b8">Sharp</text>

  <text x="146" y="68" font-family="system-ui,sans-serif" font-size="5" font-weight="600" fill="#64748b">EYES</text>
  <rect x="146" y="70" width="30" height="12" rx="3" fill="rgba(0,240,255,0.04)" stroke="#00f0ff" stroke-width="0.5"/>
  <text x="154" y="79" font-family="system-ui,sans-serif" font-size="5" fill="#00f0ff">Neutral</text>
  <rect x="180" y="70" width="30" height="12" rx="3" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="188" y="79" font-family="system-ui,sans-serif" font-size="5" fill="#94a3b8">Glasses</text>

  <text x="146" y="90" font-family="system-ui,sans-serif" font-size="5" font-weight="600" fill="#64748b">MOUTH</text>
  <rect x="146" y="92" width="30" height="12" rx="3" fill="rgba(0,240,255,0.04)" stroke="#00f0ff" stroke-width="0.5"/>
  <text x="154" y="101" font-family="system-ui,sans-serif" font-size="5" fill="#00f0ff">Smile</text>
  <rect x="180" y="92" width="30" height="12" rx="3" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="188" y="101" font-family="system-ui,sans-serif" font-size="5" fill="#94a3b8">Grin</text>

  <text x="146" y="112" font-family="system-ui,sans-serif" font-size="5" font-weight="600" fill="#64748b">HAIR</text>
  <rect x="146" y="114" width="30" height="12" rx="3" fill="rgba(0,240,255,0.04)" stroke="#00f0ff" stroke-width="0.5"/>
  <text x="154" y="123" font-family="system-ui,sans-serif" font-size="5" fill="#00f0ff">Short</text>
  <rect x="180" y="114" width="30" height="12" rx="3" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="188" y="123" font-family="system-ui,sans-serif" font-size="5" fill="#94a3b8">Waves</text>

  <!-- skin chips -->
  <text x="146" y="136" font-family="system-ui,sans-serif" font-size="5" font-weight="600" fill="#64748b">SKIN TONE</text>
  <circle cx="150" cy="144" r="6" fill="#f5d6b8" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <circle cx="166" cy="144" r="6" fill="#d4a574" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <circle cx="182" cy="144" r="6" fill="#8d5524" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <circle cx="198" cy="144" r="6" fill="#f0c8a0" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <circle cx="214" cy="144" r="6" fill="#e0ac69" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <circle cx="230" cy="144" r="6" fill="#c68642" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>

  <text x="146" y="158" font-family="system-ui,sans-serif" font-size="5" font-weight="600" fill="#64748b">HAIR COLOR</text>
  <circle cx="150" cy="166" r="6" fill="#1a1a2e" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <circle cx="166" cy="166" r="6" fill="#2d1b00" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <circle cx="182" cy="166" r="6" fill="#ffd700" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <circle cx="198" cy="166" r="6" fill="#ff2a5f" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <circle cx="214" cy="166" r="6" fill="#00f0ff" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>

  <!-- action buttons -->
  <rect x="146" y="174" width="54" height="18" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="160" y="187" font-family="system-ui,sans-serif" font-size="5" fill="#e2e8f0" text-anchor="middle">Randomize</text>
  <rect x="204" y="174" width="54" height="18" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <text x="218" y="187" font-family="system-ui,sans-serif" font-size="5" fill="#e2e8f0" text-anchor="middle">Export PNG</text>
  <rect x="262" y="174" width="50" height="18" rx="4" fill="#00f0ff"/>
  <text x="276" y="187" font-family="system-ui,sans-serif" font-size="5" font-weight="600" fill="#05060b" text-anchor="middle">Reset</text>
</svg>

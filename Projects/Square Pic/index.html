<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Square Pic Converter</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="square-pic-container">
    <h1>📸 Square Pic Converter</h1>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
      <i class="fa-solid fa-upload"></i>
      <p>Drag & drop or choose an image</p>
      <input type="file" id="uploadImage" accept="image/*" hidden />
      <button id="chooseFileBtn">Choose File</button>
    </div>

    <!-- Preview -->
    <div class="preview-area">
      <canvas id="squareCanvas"></canvas>
    </div>

    <!-- Options -->
    <div class="options">
      <button data-mode="blur"><i class="fa-solid fa-water"></i> Blur</button>
      <button data-mode="solid"><i class="fa-solid fa-square"></i> Solid</button>
      <button data-mode="gradient"><i class="fa-solid fa-palette"></i> Gradient</button>
      <button data-mode="expand"><i class="fa-solid fa-expand"></i> Expand</button>
    </div>

    <!-- Download -->
    <button id="downloadBtn" class="download-btn">
      <i class="fa-solid fa-download"></i> Download Square Image
    </button>
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>

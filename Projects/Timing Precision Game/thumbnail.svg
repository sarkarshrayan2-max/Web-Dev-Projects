<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Neon Target Gradient -->
    <linearGradient id="target-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    
    <!-- Neon Trail Gradient -->
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(59, 130, 246, 0)" />
      <stop offset="100%" stop-color="rgba(59, 130, 246, 0.6)" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" fill="url(#bg)" />

  <!-- Track Line -->
  <rect x="50" y="145" width="400" height="10" rx="5" fill="#334155" />

  <!-- Target Zone Box -->
  <rect x="220" y="125" width="60" height="50" rx="8" fill="rgba(16, 185, 129, 0.2)" stroke="url(#target-gradient)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Perfect Center Mark -->
  <line x1="250" y1="120" x2="250" y2="180" stroke="#10b981" stroke-width="2" stroke-dasharray="4, 4" />

  <!-- Cursor Trail -->
  <rect x="150" y="130" width="100" height="40" rx="4" fill="url(#trail)" />

  <!-- Moving Cursor -->
  <rect x="246" y="120" width="8" height="60" rx="4" fill="#60a5fa" filter="url(#glow)"/>
  <circle cx="250" cy="150" r="10" fill="#3b82f6" />

  <!-- Text and Accents -->
  <text x="250" y="60" font-family="system-ui, sans-serif" font-weight="900" font-size="32" fill="#f8fafc" text-anchor="middle" letter-spacing="2">TIMING PRECISION</text>
  
  <text x="250" y="240" font-family="monospace" font-weight="700" font-size="24" fill="#f59e0b" text-anchor="middle" filter="url(#glow)">STREAK x5</text>
  <text x="250" y="265" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#94a3b8" text-anchor="middle">PERFECT HIT!</text>
  
  <!-- Sparkles -->
  <path d="M 230 110 L 235 100 L 240 110 Z" fill="#fbbf24" />
  <path d="M 260 190 L 265 180 L 270 190 Z" fill="#fbbf24" />
  <circle cx="285" cy="115" r="3" fill="#10b981" />
  <circle cx="215" cy="185" r="4" fill="#34d399" />
</svg>

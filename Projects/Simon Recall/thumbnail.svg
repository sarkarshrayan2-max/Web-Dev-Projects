<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020306" />
      <stop offset="50%" stop-color="#050811" />
      <stop offset="100%" stop-color="#0a1022" />
    </linearGradient>

    <filter id="panelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#a855f7" flood-opacity="0.03"/>
    </filter>

    <filter id="soundboardFlashGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="simonBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <pattern id="spectrumGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(168, 85, 247, 0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#spectrumGrid)" />
  
  <circle cx="680" cy="380" r="180" fill="#a855f7" opacity="0.02" filter="blur(55px)" />
  <circle cx="150" cy="120" r="160" fill="#3b82f6" opacity="0.025" filter="blur(45px)" />

  <g transform="translate(50, 45)" filter="url(#panelGlow)">
    <rect width="700" height="380" rx="16" fill="#0f172a" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1.5"/>
    
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.7"/>

    <g transform="translate(545, 15)">
      <circle cx="5" cy="6" r="4" fill="url(#simonBrand)" />
      <text x="14" y="10" font-family="monospace" font-size="11" font-weight="900" fill="#f8fafc" letter-spacing="0.05em">AUDITORY_SIMON</text>
    </g>

    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-0.01em">Auditory Core</text>
      
      <rect y="24" width="126" height="24" rx="6" fill="rgba(168, 85, 247, 0.06)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>
      <text x="12" y="39" font-family="monospace" font-size="9" font-weight="800" fill="#a855f7" letter-spacing="0.02em">STATUS: PLAYBACK_</text>

      <g transform="translate(0, 64)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">SEQUENCE LENGTH</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#3b82f6">Nodes: 08 / Max</text>
      </g>

      <g transform="translate(0, 118)">
        <rect width="126" height="42" rx="8" fill="#1e293b" opacity="0.5" stroke="rgba(148, 163, 184, 0.04)" stroke-width="1"/>
        <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#64748b" letter-spacing="0.05em">MAX AUDITORY SPAN</text>
        <text x="10" y="34" font-family="monospace" font-size="14" font-weight="800" fill="#10b981">Streak: 12</text>
      </g>

      <rect y="184" width="126" height="32" rx="6" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
      <text x="63" y="204" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#f8fafc" text-anchor="middle">Flush Timeline</text>
    </g>

    <line x1="162" y1="46" x2="162" y2="380" stroke="rgba(148, 163, 184, 0.08)" stroke-width="1"/>

    <g transform="translate(230, 64)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.05em">Symphonic Matrix Grid</text>
      
      <g transform="translate(40, 36)">
        <rect width="90" height="90" rx="12" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
        <text x="45" y="50" font-family="monospace" font-size="12" font-weight="800" fill="#475569" text-anchor="middle">329.6 Hz</text>

        <g transform="translate(114, 0)" filter="url(#soundboardFlashGlow)">
          <rect width="90" height="90" rx="12" fill="#f8fafc" stroke="#ffffff" stroke-width="1.5"/>
          <text x="45" y="50" font-family="monospace" font-size="13" font-weight="900" fill="#0f172a" text-anchor="middle">440.0 Hz</text>
        </g>

        <g transform="translate(0, 114)">
          <rect width="90" height="90" rx="12" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
          <text x="45" y="50" font-family="monospace" font-size="12" font-weight="800" fill="#475569" text-anchor="middle">261.6 Hz</text>
        </g>

        <g transform="translate(114, 114)">
          <rect width="90" height="90" rx="12" fill="#1e293b" stroke="rgba(148, 163, 184, 0.1)" stroke-width="1"/>
          <text x="45" y="50" font-family="monospace" font-size="12" font-weight="800" fill="#475569" text-anchor="middle">392.0 Hz</text>
        </g>
      </g>
    </g>
  </g>

  <g transform="translate(180, 440)">
    <rect width="440" height="42" rx="21" fill="rgba(2, 3, 6, 0.95)" stroke="rgba(148, 163, 184, 0.15)" stroke-width="1.5"/>
    
    <text x="28" y="26" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.06em">AUDIO_SPATIAL SYNCHRONIZER</text>
    <circle cx="212" cy="22" r="2" fill="#475569" />
    
    <text x="228" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#38bdf8">HTML5</text>
    <text x="278" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#10b981">CSS3</text>
    <text x="324" y="26" font-family="monospace" font-size="12" font-weight="700" fill="#f59e0b">ES6+</text>
    
    <rect x="368" y="13" width="48" height="16" rx="4" fill="rgba(168, 85, 247, 0.08)" stroke="rgba(168, 85, 247, 0.15)" stroke-width="1"/>
    <text x="392" y="24" font-family="monospace" font-size="8" font-weight="900" fill="#a855f7" text-anchor="middle">OSC_BUF</text>
  </g>
</svg>

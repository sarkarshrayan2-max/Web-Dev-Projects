<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="300" fill="#03050b"/>
  
  <defs>
    <!-- Amber glow gradient -->
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#03050b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#amberGlow)"/>

  <!-- Grid lines -->
  <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 0,250 L 400,250" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- Padlock body -->
  <rect x="140" y="120" width="120" height="90" rx="12" fill="#12182b" stroke="#f59e0b" stroke-width="3" filter="drop-shadow(0 0 10px rgba(245, 158, 11, 0.3))"/>
  
  <!-- Padlock Shackle -->
  <path d="M 165,120 L 165,85 A 35,35 0 0,1 235,85 L 235,120" fill="none" stroke="#f59e0b" stroke-width="3"/>
  
  <!-- Keyhole visual -->
  <circle cx="200" cy="155" r="8" fill="#03050b"/>
  <polygon points="196,155 204,155 208,180 192,180" fill="#03050b"/>

  <!-- Matrix codes floating around lock -->
  <text x="70" y="110" fill="#06b6d4" font-family="'Fira Code', monospace" font-size="10" opacity="0.6">AES:4E</text>
  <text x="310" y="110" fill="#06b6d4" font-family="'Fira Code', monospace" font-size="10" opacity="0.6">DES:7C</text>
  <text x="70" y="210" fill="#10b981" font-family="'Fira Code', monospace" font-size="10" opacity="0.6">DH:a=6</text>
  <text x="310" y="210" fill="#10b981" font-family="'Fira Code', monospace" font-size="10" opacity="0.6">RSA:d</text>

  <!-- Title Labels -->
  <text x="200" y="45" fill="#f8fafc" font-family="'Outfit', sans-serif" font-size="16" font-weight="800" text-anchor="middle" letter-spacing="1">CRYPTO PLAYGROUND</text>
  <text x="200" y="65" fill="#94a3b8" font-family="'Space Grotesk', sans-serif" font-size="10" text-anchor="middle" letter-spacing="3">CIPHERS &amp; BRUTE-FORCE</text>
</svg>
